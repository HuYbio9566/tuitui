<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>推推云文档 · 首页 AI 三模式工作台 v5</title>
  <style>
    :root {
      --fs-primary: #245AD0;
      --fs-primary-hover: #356BDE;
      --fs-primary-active: #1948AD;
      --fs-primary-light: #E7EEFF;
      --fs-text-title: rgba(30, 30, 28, 0.92);
      --fs-text-body: rgba(30, 30, 28, 0.84);
      --fs-text-secondary: #6B6B69;
      --fs-text-tertiary: #767674;
      --fs-text-placeholder: #767674;
      --fs-text-disabled: rgba(30, 30, 28, 0.24);
      --fs-bg-body: #FBFAF8;
      --fs-bg-sidebar: #F6F5F2;
      --fs-bg-fill: #F1F0ED;
      --fs-bg-hover: #F7F6F3;
      --fs-bg-selected: #EEF3FA;
      --fs-border: rgba(46, 42, 37, 0.14);
      --fs-divider: rgba(46, 42, 37, 0.10);
      --fs-success: #12CD7A;
      --fs-warning: #FFAB2E;
      --fs-error: #FF4D48;
      --fs-radius-sm: 4px;
      --fs-radius-md: 6px;
      --fs-radius-lg: 8px;
      --fs-radius-xl: 12px;
      --fs-radius-full: 999px;
      --fs-radius-segment: 12px;
      --fs-radius-segment-inner: 8px;
      --fs-shadow-sm: 0 1px 2px rgba(31, 35, 41, 0.04), 0 8px 24px rgba(31, 35, 41, 0.05);
      --fs-shadow-md: 0 1px 3px rgba(31, 35, 41, 0.05), 0 14px 32px rgba(31, 35, 41, 0.10);
      --fs-shadow-fab: 0 6px 18px rgba(47,107,219,0.24);
      --fs-ease-out: cubic-bezier(0.23, 1, 0.32, 1);
      --fs-ease-standard: cubic-bezier(0.77, 0, 0.175, 1);
      --fs-ease-drawer: cubic-bezier(0.32, 0.72, 0, 1);
      --fs-motion-fast: 140ms;
      --fs-motion-medium: 190ms;
      --fs-font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      color: var(--fs-text-title);
      background: #E8EEF6;
      font-family: var(--fs-font);
      font-size: 14px;
      line-height: 1.6;
      letter-spacing: 0;
      font-optical-sizing: auto;
      text-rendering: optimizeLegibility;
      font-variant-numeric: tabular-nums;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(46,42,37,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(46,42,37,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.10;
    }

    ::selection {
      background: rgba(47, 107, 219, 0.16);
      color: var(--fs-text-title);
    }

    button, input, textarea { font-family: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: 0.46; box-shadow: none !important; }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible {
      outline: 2px solid rgba(47, 107, 219, 0.35);
      outline-offset: 2px;
    }

    .side-scroll,
    .content,
    .doc-canvas,
    .ai-side {
      scrollbar-width: thin;
      scrollbar-color: rgba(46, 42, 37, 0.20) transparent;
    }

    .side-scroll::-webkit-scrollbar,
    .content::-webkit-scrollbar,
    .doc-canvas::-webkit-scrollbar,
    .ai-side::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .side-scroll::-webkit-scrollbar-thumb,
    .content::-webkit-scrollbar-thumb,
    .doc-canvas::-webkit-scrollbar-thumb,
    .ai-side::-webkit-scrollbar-thumb {
      border: 3px solid transparent;
      border-radius: var(--fs-radius-full);
      background: rgba(46, 42, 37, 0.20);
      background-clip: content-box;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: 100vw;
      height: 100vh;
      padding: 8px;
      background: linear-gradient(180deg, #EDF3FA 0%, #E5ECF4 100%);
    }

    .desktop {
      width: 100%;
      height: 100%;
      min-width: 0;
      display: flex;
      overflow: hidden;
      border: 1px solid rgba(46, 42, 37, 0.08);
      border-radius: 10px;
      background: #FFFFFF;
      box-shadow: 0 20px 48px rgba(44, 58, 78, 0.14);
    }

    .desktop.suite-mode .sidebar { display: none; }

    .mobile-topbar,
    .mobile-nav-drawer { display: none; }

    .left-rail {
      width: 68px;
      flex: 0 0 68px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 12px 6px;
      background: #EAF0F7;
      border-right: 1px solid rgba(46, 42, 37, 0.08);
    }

    .avatar {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: var(--fs-radius-md);
      background: #FFFFFF;
      color: var(--fs-primary);
      font-size: 16px;
      font-weight: 600;
      box-shadow: var(--fs-shadow-sm);
    }

    .rail-group {
      width: 56px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .rail-spacer { flex: 1; }

    .rail-item {
      width: 56px;
      height: 48px;
      border: 0;
      border-radius: var(--fs-radius-sm);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      background: transparent;
      color: #3E506A;
      font-size: 10px;
    }

    .rail-item.active { background: #FFFFFF; color: var(--fs-primary); box-shadow: var(--fs-shadow-sm); }

    .sidebar {
      width: 272px;
      flex: 0 0 272px;
      display: flex;
      flex-direction: column;
      padding: 22px 12px 16px;
      border-right: 1px solid var(--fs-divider);
      background: #FBFAF8;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6px;
      margin-bottom: 16px;
    }

    .brand-actions {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 22px;
      line-height: 30px;
      font-weight: 600;
    }

    .global-search {
      position: relative;
      margin: 0 4px 14px;
    }

    .global-search input {
      width: 100%;
      height: 34px;
      padding: 0 48px 0 34px;
      border: 1px solid transparent;
      border-radius: var(--fs-radius-md);
      background: var(--fs-bg-fill);
      color: var(--fs-text-title);
      font-size: 14px;
    }

    .global-search input:focus {
      border-color: var(--fs-primary);
      background: #FFFFFF;
      box-shadow: 0 0 0 2px rgba(47, 107, 219, 0.12);
    }

    .global-search .search-icon {
      position: absolute;
      top: 8px;
      left: 10px;
      color: var(--fs-text-tertiary);
    }

    .keycap {
      position: absolute;
      top: 7px;
      right: 8px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      padding: 0 6px;
      border: 1px solid var(--fs-divider);
      border-radius: var(--fs-radius-sm);
      color: var(--fs-text-tertiary);
      background: #FFFFFF;
      font-size: 12px;
    }

    .side-scroll {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }

    .nav-group {
      padding: 8px 0 10px;
      border-top: 1px solid var(--fs-divider);
    }

    .nav-group:first-child { border-top: 0; padding-top: 0; }

    .nav-title-row {
      width: 100%;
      height: 30px;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 4px;
    }

    .nav-title {
      min-width: 0;
      flex: 1 1 auto;
      border: 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      height: 26px;
      padding: 0 4px;
      background: transparent;
      color: var(--fs-text-tertiary);
      font-size: 12px;
      line-height: 20px;
      text-align: left;
      cursor: pointer;
      transition: color var(--fs-motion-fast) var(--fs-ease-out);
    }

    .nav-title .icon {
      width: 14px;
      height: 14px;
      flex: 0 0 14px;
      transition: transform var(--fs-motion-fast) var(--fs-ease-out);
    }

    .nav-title-actions {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 2px;
    }

    .nav-title-action {
      width: 24px;
      height: 24px;
      border: 0;
      border-radius: var(--fs-radius-sm);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      background: transparent;
      color: var(--fs-text-tertiary);
      transition: background var(--fs-motion-fast) var(--fs-ease-out), color var(--fs-motion-fast) var(--fs-ease-out), transform 120ms var(--fs-ease-out);
    }

    .nav-title-action .icon {
      width: 15px;
      height: 15px;
    }

    .nav-title-action:active { transform: scale(0.94); }

    .nav-group.is-collapsed .nav-title .icon {
      transform: rotate(-90deg);
    }

    .nav-group.is-collapsed .side-item,
    .nav-group.is-collapsed .quick-list,
    .nav-group.is-collapsed .conversation-history-list {
      display: none;
    }

    .primary-nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 0 0 10px;
      border-top: 0;
    }

    .side-item {
      width: 100%;
      height: 38px;
      border: 0;
      border-radius: var(--fs-radius-lg);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      background: transparent;
      color: var(--fs-text-title);
      font-size: 14px;
      font-weight: 500;
      text-align: left;
    }

    .side-item.active { background: var(--fs-bg-selected); color: var(--fs-primary); }

    .more-nav-popover {
      position: fixed;
      z-index: 90;
      width: 224px;
      padding: 8px;
      border: 1px solid var(--fs-divider);
      border-radius: var(--fs-radius-lg);
      background: #FFFFFF;
      box-shadow: var(--fs-shadow-md);
      transform-origin: left center;
      animation: popoverMaterialize 160ms var(--fs-ease-out);
    }

    .more-nav-menu-item {
      width: 100%;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      border: 0;
      border-radius: var(--fs-radius-md);
      background: transparent;
      color: var(--fs-text-title);
      font-size: 14px;
      text-align: left;
      cursor: pointer;
    }

    .more-nav-menu-item:hover {
      background: var(--fs-bg-hover);
    }

    .create-type-popover {
      position: fixed;
      z-index: 92;
      width: 176px;
      padding: 6px;
      border: 1px solid var(--fs-divider);
      border-radius: var(--fs-radius-lg);
      background: #FFFFFF;
      box-shadow: var(--fs-shadow-md);
      transform-origin: right top;
      animation: popoverMaterialize 160ms var(--fs-ease-out);
    }

    .create-type-menu-item {
      width: 100%;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      border: 0;
      border-radius: var(--fs-radius-md);
      background: transparent;
      color: var(--fs-text-title);
      font-size: 14px;
      text-align: left;
      cursor: pointer;
    }

    .create-type-menu-item:hover {
      background: var(--fs-bg-hover);
    }

    .create-type-menu-item .icon {
      width: 20px;
      height: 20px;
      color: var(--fs-text-secondary);
    }

    .more-nav-menu-item.active {
      background: var(--fs-bg-selected);
      color: var(--fs-primary);
      font-weight: 500;
    }

    .more-nav-menu-item .icon {
      width: 20px;
      height: 20px;
    }

    .quick-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .quick-item {
      width: 100%;
      height: 30px;
      border: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 8px;
      border-radius: var(--fs-radius-md);
      background: transparent;
      color: var(--fs-text-secondary);
      font-size: 13px;
      text-align: left;
      cursor: pointer;
    }

    .quick-item span:last-child {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .quick-item.active {
      background: var(--fs-bg-selected);
      color: var(--fs-primary);
      font-weight: 500;
    }

    .conversation-history-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 0 2px 4px;
    }

    .conversation-history-row {
      min-width: 0;
      height: 32px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 26px;
      align-items: center;
      border-radius: var(--fs-radius-md);
      color: var(--fs-text-secondary);
    }

    .conversation-history-row.active {
      background: var(--fs-bg-selected);
      color: var(--fs-primary);
    }

    .conversation-history-item {
      min-width: 0;
      height: 32px;
      display: grid;
      grid-template-columns: 16px minmax(0, 1fr);
      align-items: center;
      gap: 7px;
      padding: 0 4px 0 7px;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .conversation-history-item .icon {
      width: 14px;
      height: 14px;
      color: var(--fs-text-tertiary);
    }

    .conversation-history-row.active .conversation-history-item .icon {
      color: var(--fs-primary);
    }

    .conversation-history-title {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 13px;
      line-height: 20px;
    }

    .conversation-history-more {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      padding: 0;
      border: 0;
      border-radius: var(--fs-radius-sm);
      background: transparent;
      color: var(--fs-text-tertiary);
      cursor: pointer;
      opacity: 0;
    }

    .conversation-history-more .icon {
      width: 14px;
      height: 14px;
    }

    .quick-type-icon {
      width: 20px;
      height: 20px;
      flex: 0 0 20px;
      display: inline-grid;
      place-items: center;
      color: var(--fs-text-tertiary);
    }

    .quick-type-icon .icon {
      width: 16px;
      height: 16px;
    }

    .quick-item.active .quick-type-icon {
      color: var(--fs-primary);
    }

    .workspace {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: #FFFFFF;
    }

    .topbar {
      height: 62px;
      flex: 0 0 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 24px;
      border-bottom: 0;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(20px) saturate(180%);
      box-shadow: 0 1px 0 rgba(46,42,37,0.08), 0 10px 24px rgba(44,58,78,0.035);
    }

    .topbar.is-hidden {
      display: none;
    }

    .topbar.directory-topbar {
      background: #FFFFFF;
      border-bottom: 0;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    .page-title {
      margin: 0;
      color: var(--fs-text-title);
      font-size: 18px;
      line-height: 26px;
      font-weight: 600;
    }

    .editor-title-control {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .editor-back-button {
      width: 32px;
      height: 32px;
      flex: 0 0 32px;
      display: inline-grid;
      place-items: center;
      padding: 0;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--fs-text-secondary);
      cursor: pointer;
      transition: color var(--fs-motion-fast) var(--fs-ease-out), background var(--fs-motion-fast) var(--fs-ease-out), transform 120ms var(--fs-ease-out);
    }

    .editor-back-button:hover {
      color: var(--fs-text-title);
      background: var(--fs-fill-hover);
    }

    .editor-back-button:active {
      transform: scale(0.94);
    }

    .editor-back-button:focus-visible {
      outline: 2px solid rgba(47, 107, 219, 0.38);
      outline-offset: 2px;
    }

    .editor-back-button .icon.arrow {
      width: 18px;
      height: 18px;
      transform: rotate(180deg);
    }

    .topbar-module-tabs {
      align-self: stretch;
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .topbar-module-tab {
      height: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--fs-text-tertiary);
      font-size: 16px;
      line-height: 24px;
      font-weight: 400;
      cursor: pointer;
    }

    .topbar-module-tab:hover {
      color: var(--fs-text-title);
    }

    .topbar-module-tab.active {
      color: var(--fs-text-title);
      font-size: 16px;
      font-weight: 600;
    }

    .document-topbar {
      padding-left: 20px;
      padding-right: 20px;
    }

    .document-path {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--fs-text-secondary);
      font-size: 14px;
      line-height: 22px;
    }

    .document-path > .icon {
      width: 18px;
      height: 18px;
      flex: 0 0 18px;
      color: var(--fs-primary);
    }

    .document-path-space,
    .document-path-separator {
      flex: 0 0 auto;
      color: var(--fs-text-tertiary);
    }

    .document-path-link {
      min-width: 0;
      flex: 0 1 auto;
      overflow: hidden;
      padding: 2px 0;
      border: 0;
      border-radius: 4px;
      background: transparent;
      color: var(--fs-text-tertiary);
      font: inherit;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
      transition: color var(--fs-motion-fast) var(--fs-ease-out), background var(--fs-motion-fast) var(--fs-ease-out);
    }

    .document-path-link:hover {
      color: var(--fs-primary);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .document-path-link:focus-visible {
      outline: 2px solid rgba(0,113,227,0.38);
      outline-offset: 2px;
    }

    .document-path-title {
      min-width: 0;
      max-width: 460px;
      overflow: hidden;
      color: var(--fs-text-title);
      font-weight: 600;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .document-topbar .topbar-actions {
      flex-wrap: nowrap;
    }

    .topbar-actions, .row, .tag-row, .action-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .topbar-actions .btn.is-active {
      border-color: rgba(47, 107, 219, 0.24);
      background: var(--fs-primary-light);
      color: var(--fs-primary);
    }

    .content {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 22px 24px;
      background: #FFFFFF;
    }

    .content.soft {
      background: #FFFFFF;
    }

    .content.directory-content {
      padding: 12px 18px 24px;
      background: #FFFFFF;
    }

    .content.directory-content .tabs {
      margin-bottom: 10px;
    }

    .content.flat {
      padding: 0;
      background: #FFFFFF;
    }

    .content.home-content {
      background: #FFFFFF;
    }

    .content.home-start-content {
      padding: 0;
    }

    .content.home-conversation-content {
      padding: 0;
      overflow: hidden;
      background: #FFFFFF;
    }

    .content.home-content .home-workbench {
      min-height: 100%;
      margin-bottom: 0;
    }

    .home-launchpad {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 52px 44px 72px;
      background: #F5F7FE;
    }

    .home-launchpad-inner {
      width: min(1040px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      transform: translateY(-1.5vh);
    }

    .home-launch-heading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .home-launch-title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 0;
      color: var(--fs-text-title);
      font-size: 32px;
      line-height: 1.18;
      font-weight: 600;
      letter-spacing: -0.02em;
      text-align: center;
    }

    .home-launch-mark {
      width: 36px;
      height: 36px;
      display: inline-grid;
      place-items: center;
      border-radius: var(--fs-radius-lg);
      background: var(--fs-primary-light);
      color: var(--fs-primary);
    }

    .home-launch-mark .icon {
      width: 20px;
      height: 20px;
    }

    .home-mode-switch.home-launch-mode-switch {
      width: min(500px, 100%);
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 0;
      border-color: rgba(46, 67, 108, 0.11);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 8px 24px rgba(55, 74, 112, 0.07), inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .home-launch-mode-switch .home-mode-button {
      min-width: 0;
      height: 40px;
      flex: 1;
      padding: 0 16px;
      border-radius: 999px;
      font-size: 13px;
    }

    .home-launch-mode-switch .home-mode-button.active {
      background: #EDF3FF;
      box-shadow: inset 0 0 0 1px rgba(56,115,250,0.24), 0 3px 10px rgba(56,115,250,0.10);
    }

    .home-launch-composer {
      width: 100%;
    }

    .home-launch-composer .home-mode-composer {
      min-height: 168px;
      grid-template-columns: minmax(0, 1fr) 46px;
      grid-template-rows: minmax(84px, 1fr) 40px;
      gap: 14px 14px;
      padding: 20px 18px 16px 20px;
      border-color: rgba(52, 78, 127, 0.12);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 18px 46px rgba(53, 74, 111, 0.11), 0 2px 8px rgba(53, 74, 111, 0.04), inset 0 1px 0 rgba(255,255,255,0.96);
    }

    .home-launch-composer .home-mode-input {
      min-height: 84px;
      max-height: 124px;
      grid-column: 1 / -1;
      grid-row: 1;
      padding: 0;
      font-size: 15px;
      line-height: 26px;
    }

    .home-launch-composer .home-composer-tools {
      grid-column: 1;
      grid-row: 2;
      align-self: end;
      gap: 8px;
    }

    .home-launch-composer .home-composer-tools > div {
      min-width: 0;
      flex: 0 0 auto;
    }

    .home-launch-composer .home-kb-picker {
      min-width: 0;
    }

    .home-launch-composer .home-mode-submit {
      grid-column: 2;
      grid-row: 2;
      align-self: end;
      width: 40px;
      height: 40px;
      border-radius: var(--fs-radius-full);
      box-shadow: 0 8px 18px rgba(47, 107, 219, 0.24);
    }

    .home-launch-composer .home-tool-button {
      height: 36px;
      gap: 6px;
      padding: 0 11px;
      border-color: rgba(46, 67, 108, 0.08);
      border-radius: 10px;
      background: #F7F8FB;
      color: var(--fs-text-secondary);
      font-size: 13px;
      line-height: 20px;
    }

    .home-launch-composer .home-tool-button .icon {
      width: 16px;
      height: 16px;
    }

    .home-launch-composer .home-kb-menu {
      top: 36px;
    }

    .home-launch-composer .home-tool-button:hover {
      border-color: rgba(56,115,250,0.18);
      background: #F0F4FD;
      color: var(--fs-primary);
    }

    .home-launch-actions {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .home-launch-action {
      min-width: 0;
      min-height: 82px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      padding: 14px;
      border: 1px solid rgba(52, 78, 127, 0.08);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--fs-text-title);
      text-align: left;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(55, 74, 112, 0.045), inset 0 1px 0 rgba(255,255,255,0.8);
      transition: border-color var(--fs-motion-fast) var(--fs-ease-out), background var(--fs-motion-fast) var(--fs-ease-out), color var(--fs-motion-fast) var(--fs-ease-out), transform 120ms var(--fs-ease-out), box-shadow var(--fs-motion-fast) var(--fs-ease-out);
    }

    .home-launch-action-icon {
      width: 36px;
      height: 36px;
      flex: 0 0 36px;
      display: grid;
      place-items: center;
      border-radius: 11px;
      background: #EDF3FF;
      color: var(--fs-primary);
    }

    .home-launch-action-icon .icon {
      width: 18px;
      height: 18px;
    }

    .home-launch-action-copy {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .home-launch-action-copy strong {
      overflow: hidden;
      font-size: 13px;
      line-height: 20px;
      font-weight: 600;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .home-launch-action-copy small {
      display: -webkit-box;
      overflow: hidden;
      color: var(--fs-text-tertiary);
      font-size: 11px;
      line-height: 17px;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .home-launch-action:hover,
    .home-launch-action.active {
      border-color: rgba(56,115,250,0.22);
      background: rgba(255,255,255,0.96);
      color: var(--fs-primary);
      box-shadow: 0 12px 28px rgba(55, 74, 112, 0.08);
      transform: translateY(-1px);
    }

    .home-launch-action:active { transform: scale(0.985); }

    .home-launch-action .icon {
      width: 16px;
      height: 16px;
    }

    .btn {
      height: 32px;
      border: 1px solid var(--fs-border);
      border-radius: var(--fs-radius-md);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 12px;
      background: #FFFFFF;
      color: var(--fs-text-title);
      font-size: 14px;
      white-space: nowrap;
      transition: background var(--fs-motion-fast) var(--fs-ease-out), border-color var(--fs-motion-fast) var(--fs-ease-out), color var(--fs-motion-fast) var(--fs-ease-out), transform 120ms var(--fs-ease-out), box-shadow var(--fs-motion-fast) var(--fs-ease-out);
    }

    .btn:active { transform: scale(0.98); }

    .btn.primary {
      border-color: var(--fs-primary);
      background: var(--fs-primary);
      color: #FFFFFF;
      font-weight: 500;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 3px 10px rgba(47,107,219,0.16);
    }

    .btn.text {
      border-color: transparent;
      background: transparent;
      color: var(--fs-primary);
    }

    .btn.compact {
      height: 28px;
      padding: 0 10px;
      font-size: 13px;
    }

    .icon-button {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: var(--fs-radius-md);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--fs-text-secondary);
      background: transparent;
      transition: background var(--fs-motion-fast) var(--fs-ease-out), color var(--fs-motion-fast) var(--fs-ease-out), transform 120ms var(--fs-ease-out);
    }

    .icon-button:active { transform: scale(0.96); }

    .brand-actions .icon-button {
      width: 28px;
      height: 28px;
      color: rgba(30, 30, 28, 0.58);
    }

    .brand-svg-icon {
      width: 18px;
      height: 18px;
      display: block;
      overflow: visible;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .icon {
      --icon: none;
      width: 18px;
      height: 18px;
      display: inline-flex;
      flex: 0 0 auto;
      color: currentColor;
      background-color: currentColor;
      -webkit-mask: var(--icon) center / contain no-repeat;
      mask: var(--icon) center / contain no-repeat;
    }

    .card {
      border: 1px solid rgba(46, 42, 37, 0.09);
      border-radius: var(--fs-radius-lg);
      background: #FFFFFF;
      box-shadow: 0 1px 2px rgba(31, 35, 41, 0.03), 0 10px 28px rgba(31, 35, 41, 0.045);
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 16px;
      line-height: 24px;
      font-weight: 600;
    }

    .section-title p {
      margin: 2px 0 0;
      color: var(--fs-text-secondary);
      font-size: 13px;
      line-height: 20px;
    }

    .tag {
      height: 22px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 0 8px;
      border-radius: var(--fs-radius-sm);
      background: var(--fs-bg-hover);
      color: var(--fs-text-secondary);
      font-size: 12px;
      line-height: 20px;
      white-space: nowrap;
    }

    /* 云盘视图切换使用更清晰的四宫格与列表线性图标。 */
    .icon.view-grid { --icon: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='3.25' y='3.25' width='5.25' height='5.25' rx='1' stroke='black' stroke-width='1.5'/%3E%3Crect x='11.5' y='3.25' width='5.25' height='5.25' rx='1' stroke='black' stroke-width='1.5'/%3E%3Crect x='3.25' y='11.5' width='5.25' height='5.25' rx='1' stroke='black' stroke-width='1.5'/%3E%3Crect x='11.5' y='11.5' width='5.25' height='5.25' rx='1' stroke='black' stroke-width='1.5'/%3E%3C/svg%3E"); }
    .icon.view-list { --icon: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M7 5H16M7 10H16M7 15H16' stroke='black' stroke-width='1.5' stroke-linecap='round'/%3E%3Ccircle cx='4' cy='5' r='1' fill='black'/%3E%3Ccircle cx='4' cy='10' r='1' fill='black'/%3E%3Ccircle cx='4' cy='15' r='1' fill='black'/%3E%3C/svg%3E"); }

    .tag .icon {
      width: 14px;
      height: 14px;
      flex-basis: 14px;
    }

    .tag.blue { background: var(--fs-primary-light); color: var(--fs-primary); }
    .tag.green { background: rgba(18,205,122,0.12); color: #0BAA63; }
    .tag.orange { background: rgba(255,171,46,0.14); color: #B66B00; }
    .tag.danger {
      border: 1px solid rgba(255, 77, 72, 0.35);
      background: #FFF0F0;
      color: #D93025;
    }

    .muted { color: var(--fs-text-secondary); }
    .faint { color: var(--fs-text-tertiary); }

    .metric-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }

    .metric-pill {
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--fs-divider);
      border-radius: var(--fs-radius-lg);
      background: #FFFFFF;
      color: inherit;
      font: inherit;
      text-align: left;
    }

    .metric-pill strong { font-size: 16px; line-height: 22px; }
    .metric-pill span { color: var(--fs-text-secondary); font-size: 12px; }

    .home-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.16fr) minmax(320px, 0.84fr);
      gap: 16px;
      margin-bottom: 16px;
    }

    .focus-card {
      padding: 18px;
      min-height: 266px;
    }

    .focus-card h2 {
      margin: 0 0 4px;
      font-size: 22px;
      line-height: 32px;
      font-weight: 600;
    }

    .focus-card p {
      margin: 0;
      color: var(--fs-text-secondary);
      font-size: 14px;
      line-height: 22px;
    }

    .quick-start {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    .start-tile {
      min-height: 122px;
      border: 1px solid var(--fs-divider);
      border-radius: var(--fs-radius-lg);
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      background: #FFFFFF;
      text-align: left;
      transition: background var(--fs-motion-fast) var(--fs-ease-out), border-color var(--fs-motion-fast) var(--fs-ease-out), box-shadow var(--fs-motion-fast) var(--fs-ease-out), transform 120ms var(--fs-ease-out);
    }

    .start-tile.primary {
      border-color: rgba(47, 107, 219, 0.18);
      background: linear-gradient(180deg, #F7F9FD, #FFFFFF);
    }

    .tile-icon {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: var(--fs-radius-lg);
      background: var(--fs-primary-light);
      color: var(--fs-primary);
    }

    .start-tile strong {
      display: block;
      font-size: 15px;
      line-height: 22px;
    }

    .start-tile span {
      color: var(--fs-text-secondary);
      font-size: 13px;
      line-height: 20px;
    }

    .onboarding {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .step-row {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) auto;
      align-items: center;
      column-gap: 12px;
      min-height: 64px;
      padding: 12px 14px;
      border: 1px solid transparent;
      border-radius: var(--fs-radius-lg);
      background: #FBFAF8;
      transition: border-color var(--fs-motion-fast) var(--fs-ease-out), background var(--fs-motion-fast) var(--fs-ease-out);
    }

    .step-row:hover {
      border-color: rgba(47, 107, 219, 0.12);
      background: #FFFFFF;
    }

    .step-index {
      width: 24px;
      height: 24px;
      display: inline-grid;
      place-items: center;
      justify-self: start;
      border-radius: 8px;
      background: var(--fs-primary-light);
      color: var(--fs-primary);
      font-size: 12px;
      line-height: 1;
      font-weight: 700;
    }

    .step-row > div {
      min-width: 0;
    }

    .step-row .btn {
      justify-self: end;
      min-width: 52px;
    }

    .step-row strong {
      display: block;
      font-size: 14px;
      line-height: 22px;
    }

    .step-row > div span {
      display: block;
      color: var(--fs-text-secondary);
      font-size: 12px;
      line-height: 18px;
    }

    .two-col {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 0.86fr);
      gap: 16px;
    }

    .home-workbench {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 18px;
      align-items: start;
      margin-bottom: 16px;
    }

    .home-primary {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .home-ai-window {
      min-height: 410px;
      padding: 34px 36px 30px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 24px;
      border-color: rgba(47, 107, 219, 0.24);
      background: #F9FBFF;
      box-shadow: 0 1px 2px rgba(31, 35, 41, 0.03), 0 18px 42px rgba(47, 107, 219, 0.08);
    }

    .home-ai-copy {
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .home-ai-eyebrow {
      color: var(--fs-primary);
      font-size: 13px;
      line-height: 20px;
      font-weight: 600;
    }

    .home-ai-window h2 {
      margin: 0;
      color: var(--fs-text-title);
      font-size: 30px;
      line-height: 40px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .home-ai-window p {
      margin: 0;
      color: var(--fs-text-secondary);
      font-size: 14px;
      line-height: 22px;
    }

    .home-ai-compose {
      min-height: 76px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) 56px;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border: 1px solid rgba(47, 107, 219, 0.28);
      border-radius: var(--fs-radius-xl);
      background: #FFFFFF;
      box-shadow: 0 10px 26px rgba(47, 107, 219, 0.10);
      cursor: pointer;
      transition: border-color var(--fs-motion-fast) var(--fs-ease-out), box-shadow var(--fs-motion-fast) var(--fs-ease-out);
    }

    .home-ai-input {
      min-width: 0;
      min-height: 48px;
      display: flex;
      align-items: center;
      border: 0;
      background: transparent;
      color: var(--fs-text-placeholder);
      font: inherit;
      text-align: left;
    }

    .home-kb-picker {
      position: relative;
      min-width: 156px;
    }

    .home-ai-scope {
      width: 100%;
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 12px;
      border: 1px solid rgba(56,115,250,0.16);
      border-radius: var(--fs-radius-lg);
      background: var(--fs-primary-light);
      color: var(--fs-primary);
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
    }

    .home-ai-scope .icon.chevron {
      width: 12px;
      height: 12px;
      color: currentColor;
    }

    .home-kb-menu {
      position: absolute;
      z-index: 8;
      top: 46px;
      left: 0;
      width: 196px;
      padding: 6px;
      border: 1px solid var(--fs-divider);
      border-radius: var(--fs-radius-lg);
      background: #FFFFFF;
      box-shadow: var(--fs-shadow-md);
    }

    .home-kb-option {
      width: 100%;
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 8px;
      border: 0;
      border-radius: var(--fs-radius-md);
      background: transparent;
      color: var(--fs-text-body);
      font-size: 13px;
      text-align: left;
      cursor: pointer;
    }

    .home-kb-option:hover {
      background: var(--fs-bg-hover);

      color: var(--skill-ink);
      font-size: 13px;
      line-height: 20px;
      font-weight: 700;
      letter-spacing: 0.01em;
      white-space: nowrap;

    .skill-catalog-page .skill-directory-status span {
      overflow: hidden;
      color: var(--skill-muted);
      font-size: 12px;
      line-height: 20px;
      text-overflow: ellipsis;
      white-space: nowrap;

    .skill-catalog-page .skill-directory-controls {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .skill-catalog-page .catalog-filter-tabs {
      align-self: stretch;
      gap: 18px;
      margin: 0;
    }

    .skill-catalog-page .catalog-filter-tab {
      min-height: 58px;
      position: relative;
      padding: 0;
      border-radius: 0;
      color: #626A75;
      font-size: 13px;
      line-height: 20px;
      font-weight: 500;
    }

    .skill-catalog-page .catalog-filter-tab::after {
      content: "";
      height: 2px;
      position: absolute;
      right: 0;
      bottom: -1px;
      left: 0;
      background: transparent;
      transform: scaleX(0.5);
      transform-origin: center;
      transition: background var(--fs-motion-fast) var(--fs-ease-out), transform var(--fs-motion-fast) var(--fs-ease-out);
    }

    .skill-catalog-page .catalog-filter-tab.active {
      background: transparent;
      color: var(--skill-ink);
      box-shadow: none;
      font-weight: 700;
    }

    .skill-catalog-page .catalog-filter-tab.active::after {
      background: var(--skill-blue);
      transform: scaleX(1);
    }

    .skill-catalog-page .catalog-search {
      width: 220px;
      height: 34px;
      flex-basis: 220px;
      border-color: #CCD1D8;
      border-radius: 4px;
      background: #FFFFFF;
      box-shadow: none;
    }

    .skill-catalog-page .catalog-search:focus-within {
      border-color: var(--skill-blue);
      box-shadow: 0 0 0 2px rgba(22,88,214,0.10);
    }

    .skill-directory-summary {
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--skill-rule);
      color: var(--skill-muted);
      font-size: 11px;
      line-height: 18px;
      letter-spacing: 0.04em;
    }

    .skill-directory-summary strong {
      color: var(--skill-ink);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .skill-index {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      border-bottom: 1px solid var(--skill-rule);
    }

    .skill-index-item {
      min-width: 0;
      min-height: 146px;
      display: grid;
      grid-template-columns: 34px 38px minmax(0, 1fr) auto;
      grid-template-rows: auto 1fr auto;
      gap: 6px 12px;
      position: relative;
      padding: 18px 16px;
      border-bottom: 1px solid var(--skill-rule);
      background: #FFFFFF;
      animation: skill-index-enter 320ms var(--fs-ease-out) both;
      animation-delay: calc(min(var(--skill-order, 0), 8) * 28ms);
      transition: background var(--fs-motion-fast) var(--fs-ease-out), box-shadow var(--fs-motion-fast) var(--fs-ease-out);
    }

    .skill-index-item:nth-child(odd) {
      border-right: 1px solid var(--skill-rule);
    }

    .skill-index-item:last-child,
    .skill-index-item:nth-last-child(2):nth-child(odd) {
      border-bottom: 0;
    }

    .skill-index-number {
      grid-column: 1;
      grid-row: 1;
      padding-top: 2px;
      color: #9AA2AD;
      font-family: "DIN Alternate", "Avenir Next Condensed", monospace;
      font-size: 11px;
      line-height: 18px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .skill-catalog-page .skill-monogram {
      width: 36px;
      height: 36px;
      grid-column: 2;
      grid-row: 1 / span 2;
      border: 1px solid #B9C0CA;
      border-radius: 3px;
      background: #FFFFFF;
      color: var(--skill-ink);
      font-family: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
      font-size: 17px;
      font-weight: 700;
    }

    .skill-index-copy {
      min-width: 0;
      grid-column: 3;
      grid-row: 1 / span 2;
    }

    .skill-title-button {
      max-width: 100%;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--skill-ink);
      text-align: left;
      cursor: pointer;
    }

    .skill-title-button h3 {
      min-width: 0;
      margin: 0;
      overflow: hidden;
      font-family: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
      font-size: 17px;
      line-height: 24px;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .skill-title-button .icon {
      width: 14px;
      height: 14px;
      flex: 0 0 14px;
      color: var(--skill-blue);
      opacity: 0;
      transform: translateX(-4px);
      transition: opacity var(--fs-motion-fast) var(--fs-ease-out), transform var(--fs-motion-fast) var(--fs-ease-out);
    }

    .skill-index-description {
      display: -webkit-box;
      margin: 6px 0 0;
      overflow: hidden;
      color: var(--skill-muted);
      font-size: 12px;
      line-height: 19px;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .skill-index-meta {
      min-width: 0;
      grid-column: 2 / span 2;
      grid-row: 3;
      display: flex;
      align-items: center;
      gap: 8px;
      padding-top: 4px;
      color: #7A838E;
      font-size: 10px;
      line-height: 16px;
      letter-spacing: 0.02em;
    }

    .skill-index-meta .skill-state {
      color: var(--skill-blue);
      font-weight: 700;
    }

    .skill-index-meta .skill-meta-divider {
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: #AEB4BC;
    }

    .skill-index-actions {
      grid-column: 4;
      grid-row: 1 / span 3;
      align-self: center;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      padding-left: 8px;
    }

    .skill-primary-action,
    .skill-detail-action {
      min-width: 64px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      border-radius: 4px;
      font: inherit;
      font-size: 12px;
      line-height: 18px;
      font-weight: 650;
      cursor: pointer;
      transition: background var(--fs-motion-fast) var(--fs-ease-out), border-color var(--fs-motion-fast) var(--fs-ease-out), color var(--fs-motion-fast) var(--fs-ease-out), transform 120ms var(--fs-ease-out);
    }

    .skill-primary-action {
      border: 1px solid var(--skill-blue);
      background: var(--skill-blue);
      color: #FFFFFF;
    }

    .skill-primary-action:not(.is-installed) {
      border-color: #B7C7E8;
      background: #FFFFFF;
      color: var(--skill-blue);
    }

    .skill-primary-action .icon {
      width: 14px;
      height: 14px;
    }

    .skill-primary-action.is-loading {
      min-width: 72px;
      border-color: #B7C7E8;
      background: #FFFFFF;
      color: #53657F;
    }

    .skill-primary-action.is-loading::before {
      content: "";
      width: 11px;
      height: 11px;
      border: 1.5px solid #B7C7E8;
      border-top-color: var(--skill-blue);
      border-radius: 50%;
      animation: skill-action-spin 700ms linear infinite;
    }

    .skill-detail-action {
      height: 22px;
      border: 0;
      background: transparent;
      color: #69727D;
      font-size: 11px;
      font-weight: 500;
    }

    @keyframes skill-index-enter {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes skill-action-spin {
      to { transform: rotate(360deg); }
    }

    @media (hover: hover) and (pointer: fine) {
      .skill-index-item:hover {
        background: #F8FAFD;
        box-shadow: inset 3px 0 0 var(--skill-blue);
      }

      .skill-index-item:hover .skill-title-button .icon,
      .skill-title-button:focus-visible .icon {
        opacity: 1;
        transform: translateX(0);
      }

      .skill-primary-action:hover {
        background: #0D49BC;
        border-color: #0D49BC;
      }

      .skill-primary-action:not(.is-installed):hover {
        background: var(--skill-blue-soft);
        border-color: var(--skill-blue);
      }

      .skill-detail-action:hover {
        color: var(--skill-ink);
        text-decoration: underline;
        text-underline-offset: 3px;
      }
    }

    .skill-primary-action:active,
    .skill-detail-action:active {
      transform: translateY(1px);
    }

    .ai-page {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;

    }

    .ai-composer {
      border: 1px solid rgba(46, 42, 37, 0.12);

      background: #FFFFFF;

      width: 100%;

    .composer-toolbar {
      min-height: 44px;

    .assistant-layer {
      position: fixed;
      inset: 0;
      z-index: 40;
      pointer-events: none;
    }

    .assistant-drawer {
      position: absolute;
      top: 12px;
      right: 12px;
      bottom: 12px;
      width: 392px;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(46, 42, 37, 0.12);
      border-radius: var(--fs-radius-xl);
      background: rgba(255,255,255,0.86);
      backdrop-filter: blur(24px) saturate(170%);
      box-shadow: 0 18px 52px rgba(31, 35, 41, 0.16), inset 0 1px 0 rgba(255,255,255,0.72);
      overflow: hidden;
      pointer-events: auto;
      will-change: transform, opacity, width;
    }

    .assistant-resize-handle {
      position: absolute;
      z-index: 3;
      inset: 0 auto 0 -7px;
      width: 14px;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: col-resize;
      touch-action: none;
    }

    .assistant-resize-handle::after {
      position: absolute;
      top: 50%;
      left: 6px;
      width: 2px;
      height: 42px;
      border-radius: 999px;
      background: rgba(36,90,208,0.22);
      opacity: 0;
      transform: translateY(-50%) scaleY(.72);
      transition: opacity 120ms var(--fs-ease-out), transform 120ms var(--fs-ease-out);
      content: "";
    }

    .assistant-resize-handle:hover::after,
    .assistant-resize-handle:focus-visible::after,
    .assistant-drawer.is-resizing .assistant-resize-handle::after {
      opacity: 1;
      transform: translateY(-50%) scaleY(1);
    }

    .assistant-head,

    /* 新建任务：单一主任务面，输入器固定在工作路径底部。 */
    .home-launchpad {
      min-height: 100%;
      align-items: stretch;
      justify-content: stretch;
      padding: 12px;
      background: #FFFFFF;
    }

    .home-launchpad-inner {
      width: 100%;
      max-width: none;
      min-height: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      align-items: stretch;
      gap: 0;
      transform: none;
    }

    .home-spatial-stage {
      position: relative;
      isolation: isolate;
      /* 环境光由自身 mask 收口，容器不再裁掉 blur，避免顶部出现明显切线。 */
      overflow: visible;
      min-width: 0;
      min-height: 620px;
      display: flex;
      flex-direction: column;
      padding: clamp(24px, 4.2vw, 52px) clamp(24px, 4.2vw, 52px) 0;
      border: 0;
      border-radius: 0;
      background: #FFFFFF;
    }

    .home-ambient-glow {
      --home-ambient-duration: 14s;
      --home-ambient-easing: cubic-bezier(0.77, 0, 0.175, 1);
      position: absolute;
      z-index: 0;
      top: -58px;
      left: 50%;
      width: min(940px, 112%);
      height: clamp(300px, 42vw, 450px);
      pointer-events: none;
      opacity: 0.66;
      transform: translateX(-50%);
      mask-image: radial-gradient(ellipse 78% 84% at 50% 42%, #000 0 35%, rgba(0,0,0,0.66) 58%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 78% 84% at 50% 42%, #000 0 35%, rgba(0,0,0,0.66) 58%, transparent 100%);
    }

    .home-ambient-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(48px);
      mix-blend-mode: multiply;
      opacity: var(--ambient-opacity-start, 0.72);
      will-change: transform, opacity;
      animation: homeAmbientFlow var(--home-ambient-duration) var(--home-ambient-easing) infinite alternate both;
    }

    .home-ambient-orb.blue {
      top: 30px;
      left: 16%;
      width: 34%;
      height: 54%;
      background: rgba(144, 194, 238, 0.46);
      --ambient-phase-0: translate3d(-8%, 1%, 0) scale(0.96);
      --ambient-phase-1: translate3d(9%, 8%, 0) scale(1.04);
      --ambient-phase-2: translate3d(20%, -2%, 0) scale(1.09);
      --ambient-phase-3: translate3d(4%, 13%, 0) scale(1.01);
      --ambient-opacity-start: 0.76;
      --ambient-opacity-mid: 0.9;
      --ambient-opacity-end: 0.8;
    }

    .home-ambient-orb.violet {
      top: 2px;
      left: 37%;
      width: 31%;
      height: 58%;
      background: rgba(190, 169, 231, 0.38);
      animation-delay: -3.5s;
      --ambient-phase-0: translate3d(6%, -5%, 0) scale(1.04);
      --ambient-phase-1: translate3d(-10%, 7%, 0) scale(0.96);
      --ambient-phase-2: translate3d(-18%, 16%, 0) scale(1.03);
      --ambient-phase-3: translate3d(8%, 4%, 0) scale(1.08);
      --ambient-opacity-start: 0.72;
      --ambient-opacity-mid: 0.88;
      --ambient-opacity-end: 0.76;
    }

    .home-ambient-orb.pink {
      top: 54px;
      right: 13%;
      width: 30%;
      height: 50%;
      background: rgba(241, 179, 200, 0.34);
      animation-delay: -7s;
      --ambient-phase-0: translate3d(9%, 5%, 0) scale(0.95);
      --ambient-phase-1: translate3d(-7%, -4%, 0) scale(1.07);
      --ambient-phase-2: translate3d(-19%, 11%, 0) scale(1.02);
      --ambient-phase-3: translate3d(3%, -8%, 0) scale(1.1);
      --ambient-opacity-start: 0.68;
      --ambient-opacity-mid: 0.86;
      --ambient-opacity-end: 0.74;
    }

    .home-ambient-orb.mint {
      top: 102px;
      left: 45%;
      width: 26%;
      height: 38%;
      background: rgba(166, 222, 207, 0.28);
      animation-delay: -10.5s;
      --ambient-phase-0: translate3d(-5%, 12%, 0) scale(0.98);
      --ambient-phase-1: translate3d(13%, -6%, 0) scale(1.08);
      --ambient-phase-2: translate3d(20%, 8%, 0) scale(0.94);
      --ambient-phase-3: translate3d(-8%, -4%, 0) scale(1.06);
      --ambient-opacity-start: 0.58;
      --ambient-opacity-mid: 0.82;
      --ambient-opacity-end: 0.64;
    }

    @keyframes homeAmbientFlow {
      0% {
        transform: var(--ambient-phase-0);
        opacity: var(--ambient-opacity-start, 0.72);
      }
      32% {
        transform: var(--ambient-phase-1);
        opacity: var(--ambient-opacity-mid, 0.86);
      }
      68% {
        transform: var(--ambient-phase-2);
        opacity: var(--ambient-opacity-end, 0.76);
      }
      100% {
        transform: var(--ambient-phase-3);
        opacity: var(--ambient-opacity-mid, 0.86);
      }
    }

    html.ambient-motion-paused .home-ambient-orb {
      animation-play-state: paused;
    }

    @media (prefers-reduced-motion: reduce) {
      .home-ambient-orb {
        animation: none;
        transform: var(--ambient-phase-0);
        opacity: var(--ambient-opacity-start, 0.72);
        will-change: auto;
      }
    }

        .replaceAll("&", "&amp;")

    let lastFocusedElement = null;
    let suppressNextClick = false;
    const activeSprings = new Map();

    function prefersReducedMotion() {
      return Boolean(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches);
    }

    function runSpring(key, { from, to, velocity = 0, damping = 1, response = 0.35, onUpdate, onComplete }) {
      const previous = activeSprings.get(key);
      if (previous) cancelAnimationFrame(previous.frame);
      if (prefersReducedMotion()) {
        onUpdate(to, 0);
        activeSprings.delete(key);
        if (onComplete) onComplete();
        return;
      }
      const spring = { frame: 0, value: from, velocity, lastTime: performance.now() };
      const omega = (2 * Math.PI) / Math.max(0.18, response);
      const step = (time) => {
        const current = activeSprings.get(key);
        if (current !== spring) return;
        const dt = Math.min(0.032, Math.max(0.001, (time - spring.lastTime) / 1000));
        spring.lastTime = time;
        const displacement = spring.value - to;
        const acceleration = (-2 * damping * omega * spring.velocity) - (omega * omega * displacement);
        spring.velocity += acceleration * dt;
        spring.value += spring.velocity * dt;
        onUpdate(spring.value, spring.velocity);
        if (Math.abs(spring.velocity) < 7 && Math.abs(to - spring.value) < 0.25) {
          onUpdate(to, 0);
          activeSprings.delete(key);
          if (onComplete) onComplete();
          return;
        }
        spring.frame = requestAnimationFrame(step);
      };
      activeSprings.set(key, spring);
      onUpdate(from, velocity);
      spring.frame = requestAnimationFrame(step);
    }

    function projectMomentum(initialVelocity, decelerationRate = 0.99) {
      return (initialVelocity / 1000) * decelerationRate / (1 - decelerationRate);
    }

    function rubberband(overshoot, dimension, constant = 0.55) {
      return (overshoot * dimension * constant) / (dimension + constant * Math.abs(overshoot));
    }

    function sampledVelocity(samples, axis = "x") {
      const now = performance.now();
      const recent = samples.filter((sample) => now - sample.t <= 100);
      if (recent.length < 2) return 0;
      const first = recent[0];
      const last = recent[recent.length - 1];
      const seconds = Math.max(0.016, (last.t - first.t) / 1000);
      return (last[axis] - first[axis]) / seconds;
    }

    function setupAssistantResize(drawer) {
      const handle = drawer?.querySelector("[data-assistant-resize]");
      if (!handle) return;
      handle.addEventListener("keydown", (event) => {
        if (!['ArrowLeft', 'ArrowRight'].includes(event.key)) return;
        event.preventDefault();
        const step = event.shiftKey ? 32 : 8;
        const from = drawer.getBoundingClientRect().width;
        const to = Math.min(620, Math.max(320, from + (event.key === 'ArrowLeft' ? step : -step)));
        runSpring("assistant-width", {
          from,
          to,
          damping: 1,
          response: 0.28,
          onUpdate: (value) => {
            state.aiDrawerWidth = value;
            drawer.style.width = `${value}px`;
          }
        });
      });
      handle.addEventListener("dblclick", () => {
        const from = drawer.getBoundingClientRect().width;
        runSpring("assistant-width", {
          from,
          to: 392,
          damping: 1,
          response: 0.32,
          onUpdate: (value) => {
            state.aiDrawerWidth = value;
            drawer.style.width = `${value}px`;
          }
        });
      });
      handle.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        handle.setPointerCapture(event.pointerId);
        const startX = event.clientX;
        const startWidth = drawer.getBoundingClientRect().width;
        const samples = [{ x: startX, t: performance.now() }];
        drawer.classList.add("is-resizing");
        const move = (moveEvent) => {
          const rawWidth = startWidth + startX - moveEvent.clientX;
          let width = rawWidth;
          if (rawWidth < 320) width = 320 + rubberband(rawWidth - 320, 320);
          if (rawWidth > 620) width = 620 + rubberband(rawWidth - 620, 620);
          state.aiDrawerWidth = width;
          drawer.style.width = `${width}px`;
          samples.push({ x: moveEvent.clientX, t: performance.now() });
          while (samples.length > 8) samples.shift();
        };
        const finish = (upEvent) => {
          handle.removeEventListener("pointermove", move);
          handle.removeEventListener("pointerup", finish);
          handle.removeEventListener("pointercancel", finish);
          drawer.classList.remove("is-resizing");
          const current = drawer.getBoundingClientRect().width;
          const widthVelocity = -sampledVelocity(samples, "x");
          const projected = current + projectMomentum(widthVelocity);
          const snapPoints = [360, 392, 480, 560];
          const nearest = snapPoints.reduce((best, point) => Math.abs(point - projected) < Math.abs(best - projected) ? point : best, snapPoints[0]);
          const target = current < 320 || current > 620 || Math.abs(widthVelocity) > 650 || Math.abs(nearest - current) < 14
            ? Math.min(620, Math.max(320, nearest))
            : Math.min(620, Math.max(320, current));
          runSpring("assistant-width", {
            from: current,
            to: target,
            velocity: widthVelocity,
            damping: 1,
            response: 0.32,
            onUpdate: (value) => {
              state.aiDrawerWidth = value;
              drawer.style.width = `${value}px`;
            }
          });
        };
        handle.addEventListener("pointermove", move);
        handle.addEventListener("pointerup", finish);
        handle.addEventListener("pointercancel", finish);
      });
    }

    function closeAssistantDrawer({ immediate = false, restoreFocus = true } = {}) {
      const root = document.getElementById("assistantDrawerRoot");
      const drawer = root.querySelector(".assistant-drawer");
      const wasKnowledgeDrawer = state.aiDrawerMode === "knowledge";

        if (restoreFocus && lastFocusedElement && lastFocusedElement.isConnected) lastFocusedElement.focus();

      if (!drawer || immediate || prefersReducedMotion()) {
        finalize();

      drawer.dataset.closing = "true";
      const transform = getComputedStyle(drawer).transform;
      const currentX = transform && transform !== "none" ? new DOMMatrixReadOnly(transform).m41 : 0;
      runSpring("assistant-drawer-x", {
        from: currentX,
        to: 32,
        damping: 1,
        response: 0.24,
        onUpdate: (value) => {

    function setupDriveGestures() {
      document.querySelectorAll("[data-drive-item]").forEach((item, itemIndex) => {
        item.addEventListener("pointerdown", (event) => {
          if (event.button !== 0 || event.target.closest("button, input, textarea, select")) return;
          item.setPointerCapture(event.pointerId);
          const start = { x: event.clientX, y: event.clientY };
          const samples = [{ x: event.clientX, y: event.clientY, t: performance.now() }];
          let dragging = false;
          let dx = 0;
          let dy = 0;
          let dropTarget = null;
          const move = (moveEvent) => {
            dx = moveEvent.clientX - start.x;
            dy = moveEvent.clientY - start.y;
            if (!dragging && Math.hypot(dx, dy) < 10) return;
            if (!dragging) {
              dragging = true;
              item.classList.add("is-dragging");
            }
            item.style.transform = `translate3d(${dx}px,${dy}px,0)`;
            samples.push({ x: moveEvent.clientX, y: moveEvent.clientY, t: performance.now() });
            while (samples.length > 8) samples.shift();
            const candidate = document.elementsFromPoint(moveEvent.clientX, moveEvent.clientY).find((element) => element.classList?.contains("tree-row"));
            if (candidate !== dropTarget) {
              if (dropTarget) dropTarget.classList.remove("drop-target");
              dropTarget = candidate || null;
              if (dropTarget) dropTarget.classList.add("drop-target");
            }
          };
          const finish = () => {
            item.removeEventListener("pointermove", move);
            item.removeEventListener("pointerup", finish);
            item.removeEventListener("pointercancel", finish);
            if (dropTarget) dropTarget.classList.remove("drop-target");
            if (!dragging) return;
            suppressNextClick = true;
            const vx = sampledVelocity(samples, "x");
            const vy = sampledVelocity(samples, "y");
            const name = item.dataset.driveItem || "文件";
            if (dropTarget) {
              const targetName = dropTarget.querySelector("[data-drive-node]")?.dataset.driveNode || "目标文件夹";
              showToast(`已将「${name}」移动到「${targetName}」`);
            }
            else showToast(`已取消移动「${name}」`);
            let currentX = dx;
            let currentY = dy;
            let completed = 0;
            const settle = () => {
              completed += 1;
              if (completed < 2) return;
              item.classList.remove("is-dragging");
              item.style.transform = "";
            };
            runSpring(`drive-x-${itemIndex}`, {
              from: dx, to: 0, velocity: vx, damping: 1, response: 0.4,
              onUpdate: (value) => { currentX = value; item.style.transform = `translate3d(${currentX}px,${currentY}px,0)`; },
              onComplete: settle
            });
            runSpring(`drive-y-${itemIndex}`, {
              from: dy, to: 0, velocity: vy, damping: 1, response: 0.4,
              onUpdate: (value) => { currentY = value; item.style.transform = `translate3d(${currentX}px,${currentY}px,0)`; },
              onComplete: settle
            });
          };
          item.addEventListener("pointermove", move);
          item.addEventListener("pointerup", finish);
          item.addEventListener("pointercancel", finish);
        });
      });
    }

    const pageDepth = {
      home: 0, suite: 0, spaces: 0, docs: 0, knowledge: 0, discover: 0, drive: 0, tools: 0, aiHistory: 0,

    function animatePageTransition(content, previousScreen, nextScreen) {
      if (!previousScreen || previousScreen === nextScreen) return;
      const difference = (pageDepth[nextScreen] || 0) - (pageDepth[previousScreen] || 0);
      if (!difference) return;
      if (prefersReducedMotion()) {
        content.animate([{ opacity: 0.78 }, { opacity: 1 }], { duration: 140, easing: "cubic-bezier(0.23,1,0.32,1)" });
        return;
      }
      const from = difference > 0 ? 22 : -22;
      runSpring("page-transition", {
        from,
        to: 0,
        damping: 1,
        response: 0.36,
        onUpdate: (value) => {
          content.style.transform = `translate3d(${value}px,0,0)`;
          content.style.opacity = String(1 - Math.min(0.18, Math.abs(value) / 120));
        },
        onComplete: () => {
          content.style.transform = "";
          content.style.opacity = "";
        }
      });
    }

    function docRow(doc) {
      return `
        <div class="doc-row">
          <span class="tile-icon">${icon(doc.type)}</span>

            <h3>${doc.name}</h3>

          </div>

          </div>

    function recentDocRow(doc) {
      return `
        <div class="doc-row">
          <span class="tile-icon">${icon(doc.type)}</span>
          <div>
            <h3>${doc.name}</h3>
            <p>${doc.access} · ${doc.reason} · ${doc.kb}</p>
          </div>
          <div class="tag-row">
            ${doc.confidential ? `<span class="tag danger">${icon("lock")}保密</span>` : ""}
            <span class="tag ${doc.status === "已关联" ? "green" : doc.status === "过期提醒" ? "orange" : "blue"}">${doc.status}</span>
            <button class="btn compact" type="button" data-screen="editor">继续</button>
          </div>
        </div>
      `;
    }

    function normalizeRecentDoc(doc, action = "继续") {
      return {
        ...doc,
        meta: `${doc.access} · ${doc.reason} · ${doc.kb}`,
        action
      };
    }

    function normalizeOwnedDoc(doc, action = "打开") {
      return {
        ...doc,
        meta: `${doc.owner} · ${doc.time} · ${doc.kb}`,
        action
      };
    }

    function statusTone(status) {
      if (status === "已关联") return "green";
      if (status === "过期提醒") return "orange";
      if (status === "待关联" || status === "待复核") return "blue";
      return "";
    }

    function getMyDocView(tabId) {
      const pendingDocs = docs.filter((doc) => doc.relation === "待我处理" || doc.status === "待复核" || doc.status === "过期提醒");
      const unlinkedDocs = [
        ...recentDocs.filter((doc) => doc.status === "待关联").map((doc) => normalizeRecentDoc(doc, "关联")),
        normalizeRecentDoc({ name: "采购凭证截图归档", type: "doc", owner: "胡玉彪", access: "昨天 17:46", reason: "等待选择归属知识库", kb: "未关联", status: "待关联" }, "关联"),
        normalizeRecentDoc({ name: "HULK 数据库实例容量展示对接云舟", type: "word", owner: "岳明强", access: "06-26", reason: "从文档空间同步", kb: "未关联", status: "待关联" }, "关联")
      ];
      const views = {
        recent: {
          desc: "默认回到最近打开的文档，适合继续编辑、引用和复核。",
          items: recentDocs.map((doc) => normalizeRecentDoc(doc))
        },
        created: {
          desc: "只看由我创建或归属我维护的文档，便于持续更新和权限管理。",
          items: docs.filter((doc) => doc.relation === "我创建").map((doc) => normalizeOwnedDoc(doc))
        },
        shared: {
          desc: "集中查看别人共享给我的文档，保留来源人、时间和关联知识库状态。",
          items: docs.filter((doc) => doc.relation === "与我共享").map((doc) => normalizeOwnedDoc(doc))
        },
        pending: {
          desc: "汇总需要我复核、处理过期提醒或补充确认的文档。",
          items: pendingDocs.map((doc) => normalizeOwnedDoc(doc, "处理"))
        },
        unlinked: {
          desc: "这些文档尚未沉淀到知识库，建议补充归属后再用于问答。",
          items: unlinkedDocs
        }
      };
      return views[tabId] || views.recent;
    }

    function myDocRow(doc) {

      const favorite = state.favoriteMyDocs.includes(doc.name);
      const menuOpen = state.myDocMenuName === doc.name;

            <span class="tile-icon">${icon(doc.type)}</span>

          </button>

            <button class="kb-doc-action" type="button" data-my-doc-action="download" data-my-doc-name="${docName}" aria-label="下载 ${docName}" title="下载">${icon("download")}</button>
            <button class="kb-doc-action ${favorite ? "active" : ""}" type="button" data-my-doc-action="favorite" data-my-doc-name="${docName}" aria-label="${favorite ? "取消收藏" : "收藏"} ${docName}" aria-pressed="${favorite}" title="${favorite ? "取消收藏" : "收藏"}">${icon(favorite ? "star-on" : "star")}</button>

              <button class="kb-doc-menu-item" type="button" role="menuitem" data-my-doc-menu-action="rename" data-my-doc-name="${docName}">${icon("rename")}重命名</button>
              <button class="kb-doc-menu-item" type="button" role="menuitem" data-my-doc-menu-action="share" data-my-doc-name="${docName}">${icon("share")}分享</button>
              <button class="kb-doc-menu-item" type="button" role="menuitem" data-my-doc-menu-action="download" data-my-doc-name="${docName}">${icon("download")}下载</button>
              <button class="kb-doc-menu-item danger" type="button" role="menuitem" data-my-doc-menu-action="delete" data-my-doc-name="${docName}">${icon("trash")}删除</button>
            </div>
          ` : ""}
        </article>
      `;
    }

    function spaceAvatarIcon(space) {
      if (space.confidential) return "lock";

      const scopedSpaces = state.selectedSpaceTab === "owned" ? docSpaces.filter((space) => ["胡玉彪", "宋登举"].includes(space.owner)) : state.selectedSpaceTab === "department" ? docSpaces.slice(3) : state.selectedSpaceTab === "open" ? docSpaces.filter((space) => !space.confidential) : state.selectedSpaceTab === "favorite" ? docSpaces.filter((space) => space.favorite) : docSpaces;

    function renderMyDocs() {
      const activeTab = myDocTabs.some((tab) => tab.id === state.selectedDocTab) ? state.selectedDocTab : "recent";
      const view = getMyDocView(activeTab);
      const items = filterItems(view.items).filter((doc) => !state.deletedMyDocs.includes(doc.name));
      const batchBar = activeTab === "unlinked" ? `
        <div class="batch-bar">
          <div>
            <strong>AI 已为 ${items.length} 篇未关联文档推荐归属</strong>
            <p>确认后会进入对应知识库，并继承原空间权限；保密文档不会进入知识广场。</p>

          <div class="action-row">

        <div class="tabs">
          ${myDocTabs.map((tab) => `<button class="tab ${tab.id === activeTab ? "active" : ""}" type="button" data-doc-tab="${tab.id}">${tab.label}</button>`).join("")}

    function generatedWritingBody() {
      const goal = state.generatedWritingGoal;

      if (goal.includes("周报") || goal.includes("进展")) {
        return `<h3>一、本周结论</h3><p>本周已完成云文档首页信息层级、可信问答与三种工作模式的主链路。整体进入可用性补齐阶段。</p><h3>二、进展与依据</h3><ul><li>首页按“找答案、办任务、写文档”组织，降低模式理解成本。</li><li>回答展示引用原文、权限状态和过滤记录。</li><li>任务在执行前确认计划，写作在生成前确认读者与输出位置。</li></ul><h3>三、风险与下一步</h3><p><span class="highlight">仍需持续验证移动端导航、长任务恢复和知识库复核效率。</span></p><p>下周完成真实数据接入、全链路埋点和无障碍验收。</p>`;
      }
      if (goal.includes("会议")) return `<h3>会议结论</h3><p>团队确认以可信知识工作台作为云文档首页主线。</p><h3>责任人与待办</h3><ul><li>产品：确认模式指标与上线范围。</li><li>设计：补齐异常和移动端状态。</li><li>研发：完成权限快照、引用锚点和任务恢复。</li></ul>`;

    }

    function renderAiTask() {
      const baseSteps = [
        ["确认目标与资料范围", "读取推荐范围内 12 篇最近文档"],
        ["提取项目进展与关键变化", "比较本周更新和上周基线"],
        ["识别风险、依赖与责任人", "列出风险并匹配负责人"],
        ["生成周报并沉淀到文档", "输出包含引用来源和负责人待办"]
      ];
      const isReview = state.taskStatus === "review";
      const isPaused = state.taskStatus === "paused";
      const isComplete = state.taskStatus === "complete";
      const progress = isReview ? 0 : isComplete ? 100 : Math.min(90, 15 + state.taskStep * 25);
      const steps = baseSteps.map(([title, desc], index) => {
        if (isReview) return [title, desc, "待确认", ""];
        if (isComplete || index < state.taskStep) return [title, desc, "已完成", "green"];
        if (index === state.taskStep) return [title, isPaused ? "任务已暂停，可从此处继续" : desc, isPaused ? "已暂停" : "执行中", isPaused ? "orange" : "blue"];
        return [title, desc, "待执行", ""];
      });
      return `
        <div class="task-workbench" data-screen-label="v5-AI任务工作台">
          <section class="card task-main">
            <div class="task-hero">
              <div>
                <span class="home-ai-eyebrow">办任务 · 计划、确认、执行</span>
                <h2>${escapeHtml(state.activeTaskTitle)}</h2>
                <p>AI 已根据目标生成执行计划；涉及发布、分享和知识写入时会先请你确认。</p>
              </div>
              <span class="tag ${isComplete ? "green" : isPaused ? "orange" : "blue"}">${isReview ? "待确认 0%" : isComplete ? "已完成 100%" : isPaused ? `已暂停 ${progress}%` : `执行中 ${progress}%`}</span>
            </div>
            <div class="task-plan">
              ${steps.map(([title, desc, status, tone], index) => `
                <div class="task-plan-row">
                  <span class="step-index">${index + 1}</span>
                  <div><h3>${title}</h3><p>${desc}</p></div>
                  <span class="tag ${tone}">${status}</span>

              `).join("")}
            </div>
            ${isReview ? `<div class="batch-bar" style="margin-top:16px;"><div><strong>执行前确认</strong><p>当前只生成计划，尚未写入、分享或修改任何资料。</p></div><div class="action-row"><button class="btn" type="button" data-action-panel="taskScope">调整计划</button><button class="btn primary" type="button" data-task-confirm>确认并开始</button></div></div>` : isComplete ? `<div class="setup-section"><h3>任务结果</h3><div class="task-result-grid"><div class="task-result-card"><strong>8</strong><span>项目进展</span></div><div class="task-result-card"><strong>3</strong><span>风险事项</span></div><div class="task-result-card"><strong>5</strong><span>负责人待办</span></div></div><div class="action-row" style="margin-top:16px;"><button class="btn primary" type="button" data-task-open-result>${icon("doc")}打开生成的周报</button><button class="btn" type="button" data-action-panel="depositAnswer">沉淀到知识库</button></div></div>` : `<div class="batch-bar" style="margin-top:16px;"><div><strong>${isPaused ? "任务已安全暂停" : "任务正在执行"}</strong><p>${isPaused ? "已保存进度、权限快照和当前结果。" : "每一步都会保留输入、来源和执行记录。"}</p></div><div class="action-row"><button class="btn" type="button" data-task-toggle>${isPaused ? "继续任务" : "暂停任务"}</button><button class="btn primary" type="button" data-task-advance>${state.taskStep >= 3 ? "完成任务" : "完成当前步骤"}</button></div></div>`}
          </section>

    function visibleDriveTreeNodes() {
      const expanded = new Set(state.expandedDriveNodes);
      const openAncestors = [];
      return driveTree.filter((node) => {
        openAncestors.length = node.level;
        const visible = node.level === 0 || openAncestors.every(Boolean);
        openAncestors[node.level] = !node.hasChildren || expanded.has(node.label);
        return visible;
      });
    }

    function driveDescendantLabels(label) {
      const parentIndex = driveTree.findIndex((node) => node.label === label);
      if (parentIndex < 0) return [];
      const parentLevel = driveTree[parentIndex].level;
      const descendants = [];
      for (let index = parentIndex + 1; index < driveTree.length; index += 1) {
        if (driveTree[index].level <= parentLevel) break;
        descendants.push(driveTree[index].label);
      }
      return descendants;
    }

    function toggleDriveNode(label) {
      const expanded = new Set(state.expandedDriveNodes);
      if (expanded.has(label)) {
        expanded.delete(label);
        if (driveDescendantLabels(label).includes(state.selectedDriveNode)) state.selectedDriveNode = label;
      } else {
        expanded.add(label);
      }
      state.expandedDriveNodes = [...expanded];
    }

    function captureEditorDraft() {
      const surface = document.querySelector(".editor-surface");
      if (surface) state.editorDraftHtml = surface.innerHTML;
    }

      captureEditorDraft();
      lastFocusedElement = document.activeElement;
