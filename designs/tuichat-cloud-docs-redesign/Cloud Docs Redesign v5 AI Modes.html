    function finishEditorExit(saveChanges) {
      const { quickDoc, previewDoc } = getEditorDocumentContext();
      if (saveChanges) captureEditorDraft();
      if (!saveChanges) state.editorDraftHtml = "";
      state.editorDirty = false;
      if (!saveChanges && (quickDoc || previewDoc)) {
        state.editorTitleOverride = "";
        state.editorPreviewMode = false;
      } else {
        state.editorPreviewMode = true;
      }
      if (state.aiDrawerOpen && state.aiDrawerMode === "knowledge") {
        closeAssistantDrawer({ immediate: true, restoreFocus: false });
      }
      closeActionPanel({ immediate: true });
      renderContent();
      showToast(saveChanges ? "更改已保存，已返回文档预览" : "未保存更改，已返回文档预览");
    }

    function closeActionPanel({ immediate = false } = {}) {
      const root = document.getElementById("actionModalRoot");
      const mask = root.querySelector(".modal-mask");
      const finalize = () => {
        closeActionPanel.timer = null;
        root.innerHTML = "";
        if (lastFocusedElement && typeof lastFocusedElement.focus === "function" && lastFocusedElement.isConnected) lastFocusedElement.focus();
        lastFocusedElement = null;
      };
      if (!mask) return;
      if (immediate || prefersReducedMotion()) {
        finalize();
        return;
      }
      if (mask.classList.contains("closing")) return;
      mask.classList.add("closing");
      closeActionPanel.timer = window.setTimeout(finalize, 155);
    }

    function closeStaticModal(id, { immediate = false, restoreFocus = true } = {}) {
      const modal = document.getElementById(id);
      if (!modal?.classList.contains("show")) return;
      const finalize = () => {
        modal.classList.remove("show", "closing");
        if (restoreFocus && lastFocusedElement && lastFocusedElement.isConnected) lastFocusedElement.focus();
        lastFocusedElement = null;
      };
      if (immediate || prefersReducedMotion()) {
        finalize();
        return;
      }
      modal.classList.add("closing");
      window.setTimeout(finalize, 155);
    }

    function prototypeAnswer(question) {
      if (question.includes("项目") || question.includes("周报")) {
        return "本周项目已完成首页信息层级调整和知识问答可信闭环，当前主要风险是 2 条规则仍待负责人复核、1 份保密资料未开放检索。建议本周先完成规则确认，再把进展、风险和责任人沉淀到工作周报。";
      }
      if (question.includes("风险") || question.includes("合规")) {
        return "已检查权限、密级、引用来源和规则有效期。发现 1 篇保密复盘无当前查看权限，已从回答中排除；另有 2 条规则超过复核周期，建议由知识库负责人确认后再公开使用。";
      }
      if (question.includes("新人") || question.includes("学习")) {
        return "建议先阅读项目目标、角色分工和最新周报，再学习核心流程与常见问题。已按“项目概览、工作流程、关键规则、常见问题”整理为四阶段清单，每项都保留来源文档。";
      }
      return "根据现有报销规则，需提交订阅截图、支付凭证、项目编号、工具用途说明和负责人确认截图；跨团队项目还需补充使用场景与归属项目。回答已过滤 1 条无权限资料，并保留可追溯来源。";
    }

    function appendHomeConversation(question) {
      const normalized = question.trim();
      if (!normalized) return false;
      if (!state.selectedConversationId) state.selectedConversationId = "current";
      state.homeConversationMessages.push(
        { role: "user", text: normalized },
        { role: "assistant", text: prototypeAnswer(normalized) }
      );
      state.homeConversationActive = true;
      state.homeAiMode = "chat";
      state.homeAiDrafts.chat = "";
      state.screen = "home";
      state.aiDrawerOpen = false;
      state.homeKbMenuOpen = false;
      return true;
    }

    function scrollTaskThreadToBottom() {
      window.requestAnimationFrame(() => {
        const scroller = document.querySelector(".task-thread-scroll");
        if (!scroller) return;
        const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        scroller.scrollTo({ top: scroller.scrollHeight, behavior: reduceMotion ? "auto" : "smooth" });
      });
    }

    function startHomeConversation(question) {
      const normalized = question.trim();
      if (!normalized) return false;
      if (!state.selectedConversationId) state.selectedConversationId = "current";
      state.homeConversationMessages.push({ role: "user", text: normalized }, { role: "assistant", text: "", pending: true });
      state.homeConversationActive = true;
      state.homeAiMode = "chat";
      state.homeAiDrafts.chat = "";
      state.screen = "home";
      state.chatStatus = "loading";
      renderContent();
      scrollTaskThreadToBottom();
      window.setTimeout(() => {
        const pending = [...state.homeConversationMessages].reverse().find((message) => message.pending);
        if (pending) {
          pending.pending = false;
          pending.text = prototypeAnswer(normalized);
        }
        state.chatStatus = "complete";
        renderContent();
        scrollTaskThreadToBottom();
        showToast("已生成带来源的可信回答");
      }, 650);
      return true;
    }

    function openConversationHistoryItem(conversationId) {
      if (conversationId === "current" && state.homeConversationMessages.length) {
        state.homeConversationActive = true;
        state.homeAiMode = "chat";
        state.screen = "home";
        state.aiDrawerOpen = false;
        renderContent();
        return;
      }
      const item = conversationHistoryItems.find((entry) => entry.id === conversationId);
      if (!item) return;
      state.selectedConversationId = item.id;
      state.homeConversationMessages = [
        { role: "user", text: item.prompt },
        { role: "assistant", text: prototypeAnswer(item.prompt) }
      ];
      state.homeConversationActive = true;
      state.homeAiMode = "chat";
      state.homeAiDrafts.chat = "";
      state.screen = "home";
      state.aiDrawerOpen = false;
      state.homeKbMenuOpen = false;
      renderContent();
      showToast(`已恢复对话：${item.title}`);
    }

    function openHistoryItem(historyId) {
      const item = aiHistoryItems.find((entry) => entry.id === historyId);
      if (!item) return;
      state.aiDrawerOpen = false;
      state.homeKbMenuOpen = false;
      state.selectedConversationId = "";
      if (item.type === "chat") {
        state.homeConversationMessages = [
          { role: "user", text: item.title },
          { role: "assistant", text: prototypeAnswer(item.title) }
        ];
        state.homeConversationActive = true;
        state.homeAiMode = "chat";
        state.selectedConversationId = conversationHistoryItems.some((entry) => entry.id === item.id) ? item.id : "current";
        state.screen = "home";
      } else if (item.type === "task") {
        state.activeTaskTitle = item.title;
        state.screen = "aiTask";
      } else {
        state.editorTitleOverride = item.title;
        state.editorPreviewMode = false;
        state.editorDraftHtml = "";
        state.editorDirty = false;
        state.activeDocumentPreview = null;
        state.activeDocumentKind = "doc";
        state.documentBreadcrumb = [
          { label: "我的文档", screen: "docs", docTab: "recent" },
          { label: "历史任务", screen: "docs", docTab: "recent" }
        ];
        state.screen = "editor";
      }
      renderContent();
      showToast(`已继续：${item.title}`);
    }

    function navigateToScreen(screen, options = {}) {
      state.screen = screen;
      state.selectedQuickId = "";
      state.aiDrawerOpen = false;
      state.homeKbMenuOpen = false;
      state.moreMenuOpen = false;
      state.createTypeMenuOpen = false;
      state.mobileNavOpen = false;
      if (screen !== "editor") {
        state.activeDocumentPreview = null;
        state.documentBreadcrumb = [];
      }
      if (screen === "editor" && !options.keepEditorTitle) {
        state.activeDocumentPreview = null;
        state.activeDocumentKind = "doc";
        state.documentBreadcrumb = [{ label: "我的文档", screen: "docs", docTab: state.selectedDocTab || "recent" }];
        state.editorTitleOverride = "";
        state.editorPreviewMode = false;
        state.editorDraftHtml = "";
        state.editorDirty = false;
        state.generatedWritingGoal = "";
      }
      if (screen === "docs" && options.resetDocTab !== false) state.selectedDocTab = "recent";
      if (screen === "knowledge" && options.resetKnowledgeTab) state.selectedKnowledgeTab = "all";
      if (screen !== "knowledge") state.kbAskOpen = false;
      renderContent();
    }

    function navigateFromSideNavTarget(target) {
      if (target.dataset.navToolSection || target.dataset.navDiscoverTab === "experts") {
        state.catalogQuery = "";
      }
      if (target.dataset.navAction === "new-task") {
        state.homeConversationActive = false;
        state.homeConversationMessages = [];
        state.selectedConversationId = "";
        state.homeAiMode = "task";
        state.homeAiDrafts = { chat: "", task: "", writing: "" };
      }
      if (target.dataset.navDiscoverTab) {
        state.selectedDiscoverTab = target.dataset.navDiscoverTab;
      }
      if (target.dataset.navToolSection) {
        state.toolSection = target.dataset.navToolSection;
      }
      navigateToScreen(target.dataset.navScreen, { resetKnowledgeTab: target.dataset.navScreen === "knowledge" });
    }

    function renderContent() {
      const content = document.getElementById("content");
      const previousScreen = content.dataset.currentScreen || "";
      const isDirectoryScreen = ["knowledge", "docs", "spaces", "drive", "tools", "discover"].includes(state.screen);
      const map = {
        home: renderHome,
        spaces: renderSpaces,
        docs: renderMyDocs,
        editor: renderEditor,
        ai: renderAi,
        aiTask: renderAiTask,
        aiHistory: renderAiHistory,
        knowledge: renderKnowledge,
        knowledgeDetail: renderKnowledgeDetail,
        discover: renderDiscover,
        drive: renderDrive,
        tools: renderTools,
        writingSetup: renderWritingSetup,
        sourcePreview: renderSourcePreview,
        fileDetail: renderFileDetail,
        suite: renderSuiteModule
      };
      content.className = state.screen === "editor"
        ? "content flat"
        : state.screen === "home"
          ? `content home-content ${state.homeConversationActive ? "home-conversation-content" : "home-start-content"}`
          : `content soft${isDirectoryScreen ? " directory-content" : ""}`;
      content.innerHTML = (map[state.screen] || renderHome)();
      content.dataset.currentScreen = state.screen;
      document.querySelector(".desktop").classList.toggle("suite-mode", state.screen === "suite");
      renderTopbar();
      renderSideNav();
      renderRail();
      renderMobileTopbar();
      renderMobileNav();
      renderAssistantDrawer();
      if (state.screen === "drive") setupDriveGestures();
      animatePageTransition(content, previousScreen, state.screen);
    }

    document.getElementById("sideNav").addEventListener("click", (event) => {
      const sideNavTarget = event.target.closest("[data-nav-screen]");
      if (!sideNavTarget) return;
      event.preventDefault();
      event.stopPropagation();
      navigateFromSideNavTarget(sideNavTarget);
    }, true);

    document.addEventListener("click", (event) => {
      if (!suppressNextClick) return;
      suppressNextClick = false;
      event.preventDefault();
      event.stopImmediatePropagation();
    }, true);

    document.addEventListener("click", (event) => {
      const mobileNavToggle = event.target.closest("[data-mobile-nav-toggle]");
      if (mobileNavToggle) {
        state.mobileNavOpen = !state.mobileNavOpen;
        renderMobileTopbar();
        renderMobileNav();
        return;
      }

      if (event.target.closest("[data-mobile-nav-close]")) {
        state.mobileNavOpen = false;
        renderMobileTopbar();
        renderMobileNav();
        return;
      }

      const railTarget = event.target.closest("[data-rail-module]");
      if (railTarget) {
        const moduleId = railTarget.dataset.railModule;
        state.mobileNavOpen = false;
        state.aiDrawerOpen = false;
        if (moduleId === "cloud-doc") {
          state.screen = "home";
          state.suiteModule = "cloud-doc";
        } else {
          state.suiteModule = moduleId;
          state.screen = "suite";
        }
        renderContent();
        return;
      }

      const sideNavTarget = event.target.closest("[data-nav-screen]");
      if (sideNavTarget) {
        navigateFromSideNavTarget(sideNavTarget);
        return;
      }

      const moduleScreenTarget = event.target.closest("[data-module-screen]");
      if (moduleScreenTarget) {
        navigateToScreen(moduleScreenTarget.dataset.moduleScreen);
        return;
      }

      const moduleDiscoverTarget = event.target.closest("[data-module-discover]");
      if (moduleDiscoverTarget) {
        state.selectedDiscoverTab = moduleDiscoverTarget.dataset.moduleDiscover === "experts" ? "experts" : "all";
        state.screen = "discover";
        state.selectedQuickId = "";
        state.aiDrawerOpen = false;
        renderContent();
        return;
      }

      const moreMenuToggle = event.target.closest("[data-more-menu-toggle]");
      if (moreMenuToggle) {
        const rect = typeof moreMenuToggle.getBoundingClientRect === "function"
          ? moreMenuToggle.getBoundingClientRect()
          : { top: 340, right: 340 };
        state.moreMenuPosition = { top: Math.max(8, rect.top), left: rect.right + 8 };
        state.moreMenuOpen = !state.moreMenuOpen;
        state.createTypeMenuOpen = false;
        renderSideNav();
        return;
      }

      const moreDestination = event.target.closest("[data-more-destination]");
      if (moreDestination) {
        const destination = moreDestination.dataset.moreDestination;
        state.moreMenuOpen = false;
        state.mobileNavOpen = false;
        if (destination === "experts") {
          state.selectedDiscoverTab = "experts";
          navigateToScreen("discover");
        } else {
          state.toolSection = destination;
          navigateToScreen("tools");
        }
        return;
      }

      const createTypeToggle = event.target.closest("[data-create-type-toggle]");
      if (createTypeToggle) {
        const rect = typeof createTypeToggle.getBoundingClientRect === "function"
          ? createTypeToggle.getBoundingClientRect()
          : { bottom: 364, right: 340 };
        const viewportWidth = typeof window !== "undefined" && window.innerWidth ? window.innerWidth : 1440;
        const menuWidth = 176;
        state.createTypeMenuPosition = {
          top: Math.max(8, rect.bottom + 6),
          left: Math.max(8, Math.min(viewportWidth - menuWidth - 8, rect.right - menuWidth))
        };
        state.createTypeMenuOpen = !state.createTypeMenuOpen;
        state.moreMenuOpen = false;
        renderSideNav();
        return;
      }

      const createTypeTarget = event.target.closest("[data-create-type]");
      if (createTypeTarget) {
        const createType = createTypeTarget.dataset.createType;
        state.createTypeMenuOpen = false;
        if (createType === "document") {
          state.editorTitleOverride = "未命名文档";
          state.editorPreviewMode = false;
          state.editorDraftHtml = "";
          state.editorDirty = false;
          navigateToScreen("editor", { keepEditorTitle: true });
          showToast("已新建文档");
        } else {
          navigateToScreen("knowledge");
          openActionPanel("createKb");
        }
        return;
      }

      if (state.createTypeMenuOpen && !event.target.closest(".create-type-popover")) {
        state.createTypeMenuOpen = false;
        renderSideNav();
        return;
      }

      if (state.moreMenuOpen && !event.target.closest(".more-nav-popover")) {
        state.moreMenuOpen = false;
        renderSideNav();
        return;
      }

      const quickTarget = event.target.closest("[data-quick-item]");
      if (quickTarget) {
        const quickItem = quickItems.find((item) => item.id === quickTarget.dataset.quickItem);
        if (quickItem) {
          const origin = quickItem.sourceKb
            ? [
                { label: "我的知识库", screen: "knowledge" },
                { label: quickItem.sourceKb, screen: "knowledgeDetail", kbName: quickItem.sourceKb }
              ]
            : [{ label: "我的文档", screen: "docs", docTab: "recent" }];
          openDocumentPreview({
            title: quickItem.editorTitle,
            quickId: quickItem.id,
            kind: quickItem.kind,
            origin
          });
        }
        return;
      }

      const recentDocTarget = event.target.closest("[data-recent-doc]");
      if (recentDocTarget) {
        const documentName = recentDocTarget.dataset.recentDoc;
        const quickItem = quickItems.find((item) => item.editorTitle === documentName);
        const recentDoc = recentDocs.find((item) => item.name === documentName) || {};
        openDocumentPreview({
          title: documentName,
          quickId: quickItem?.id || "",
          kind: recentDoc.type || quickItem?.kind || "doc",
          origin: [
            { label: "我的文档", screen: "docs", docTab: "recent" },
            { label: "最近打开", screen: "docs", docTab: "recent" }
          ],
          meta: recentDoc
        });
        return;
      }

      const myDocActionTarget = event.target.closest("[data-my-doc-action]");
      if (myDocActionTarget) {
        event.preventDefault();
        event.stopPropagation();
        const action = myDocActionTarget.dataset.myDocAction;

      const kbDocMenuTarget = event.target.closest("[data-kb-doc-menu-action]");

          const spaceName = openDocumentTarget.dataset.documentSpace || "云文档空间";

          const spaceTab = state.selectedSpaceTab || "all";
          origin = [
            { label: "云文档空间", screen: "spaces", spaceTab },

        return;
      }

      if (event.target.closest("[data-action-close]")) {
        closeActionPanel();
        return;
      }

      const skillDetailAction = event.target.closest("[data-skill-detail-action]");
      if (skillDetailAction) {
        const skill = skillCatalog.find((item) => item.id === skillDetailAction.dataset.skillDetailAction);
        const installed = skill && state.installedSkills.includes(skill.id);
        closeActionPanel();
        if (!skill) return;
        if (installed) {
          state.homeAiMode = "task";
          state.homeAiDrafts.task = `使用「${skill.name}」完成当前任务`;
          state.screen = "home";
          renderContent();
          showToast("技能已带入办任务模式");
        } else {
          state.installingSkill = skill.id;
          renderContent();
          window.setTimeout(() => {
            if (!state.installedSkills.includes(skill.id)) state.installedSkills.push(skill.id);
            state.installingSkill = "";
            if (state.screen === "tools" && state.toolSection === "skills") renderContent();
            showToast(`已添加技能：${skill.name}`);
          }, prefersReducedMotion() ? 120 : 520);
        }
        return;
      }

      const actionConfirm = event.target.closest("[data-action-confirm]");
      if (actionConfirm) {
        const text = actionConfirm.dataset.actionConfirm || "已确认";
        const actionType = actionConfirm.dataset.actionConfirmType || "";
        const subject = actionConfirm.dataset.actionSubject || "当前内容";
        if (actionType === "deleteKnowledgeDoc") {
          if (!state.deletedKnowledgeDocs.includes(subject)) state.deletedKnowledgeDocs.push(subject);
          state.favoriteKnowledgeDocs = state.favoriteKnowledgeDocs.filter((name) => name !== subject);
          state.kbDocMenuName = "";
          closeActionPanel();
          renderContent();
          showToast(`已移入回收站：${subject}`);
          return;
        }
        if (actionType === "deleteMyDocument") {
          if (!state.deletedMyDocs.includes(subject)) state.deletedMyDocs.push(subject);
          state.favoriteMyDocs = state.favoriteMyDocs.filter((name) => name !== subject);
          state.myDocMenuName = "";
          closeActionPanel();
          renderContent();
          showToast(`已移入回收站：${subject}`);
          return;
        }
        closeActionPanel();
        showToast(`${text} 已准备`);
        return;
      }

      const kbOpenControl = event.target.closest("[data-kb-open]");
      const kbOpenCard = event.target.closest("[data-kb-card-open]");
      const nestedKbControl = kbOpenCard && event.target.closest("button, a, input, textarea, select, [role='button']");
      const kbOpenName = kbOpenControl?.dataset.kbOpen || (!nestedKbControl ? kbOpenCard?.dataset.kbCardOpen : "");
      if (kbOpenName) {
        state.selectedQuickId = "";
        state.selectedKbName = kbOpenName || state.selectedKbName;
        state.screen = "knowledgeDetail";
        state.kbAskOpen = false;
        state.aiDrawerOpen = false;
        state.homeKbMenuOpen = false;
        renderContent();
        showToast(`${state.selectedKbName} 已打开`);
        return;
      }

      if (event.target.closest("[data-guide-ai]")) {
        closeStaticModal("guideModal", { restoreFocus: false });
        try { localStorage.setItem("tuichat-guide-seen", "1"); } catch (error) {}
        state.screen = "home";
        state.selectedQuickId = "";
        state.selectedScope = "推荐范围";
        state.homeKbScope = "推荐范围";
        state.kbAskOpen = false;
        state.homeAiMode = "chat";
        state.homeAiDrafts.chat = "6 月 AI 工具订阅报销需要哪些凭证？";
        state.homeConversationActive = false;
        state.aiDrawerOpen = false;
        state.homeKbMenuOpen = false;
        renderContent();
        showToast("问题已带入首页对话工作台");
        return;
      }

      if (event.target.closest("[data-guide-close]")) {
        closeStaticModal("guideModal");
        try { localStorage.setItem("tuichat-guide-seen", "1"); } catch (error) {}
        return;
      }

      const homeKbOption = event.target.closest("[data-home-kb-option]");
      if (homeKbOption) {
        state.homeKbScope = homeKbOption.dataset.homeKbOption;
        state.selectedScope = state.homeKbScope;
        state.homeKbMenuOpen = false;
        renderContent();
        showToast(`已选择：${state.homeKbScope}`);
        return;
      }

      if (event.target.closest("[data-home-kb-toggle]")) {
        state.homeKbMenuOpen = !state.homeKbMenuOpen;
        renderContent();
        return;
      }

      if (event.target.closest("[data-knowledge-drawer-toggle]")) {
        if (state.aiDrawerOpen && state.aiDrawerMode === "knowledge") {
          closeAssistantDrawer();
          return;
        }
        lastFocusedElement = document.activeElement;
        state.aiDrawerMode = "knowledge";
        state.aiDrawerOpen = true;
        state.kbAskOpen = false;
        state.homeKbMenuOpen = false;
        renderAssistantDrawer();
        renderTopbar();
        focusDialog(document.getElementById("assistantDrawerRoot"));
        showToast("已打开相关知识，可按需调用或插入引用");
        return;
      }

      const aiTarget = event.target.closest("[data-ai-assistant]");
      if (aiTarget) {
        lastFocusedElement = document.activeElement;
        state.aiDrawerMode = "assistant";
        state.aiContext = aiTarget.dataset.aiAssistant || state.screen || "home";
        state.aiDraft = aiTarget.dataset.aiPrompt || "";
        state.aiAnswerReady = false;
        state.aiDrawerOpen = true;
        state.kbAskOpen = false;
        state.homeKbMenuOpen = false;
        renderAssistantDrawer();
        if (state.screen === "editor") renderTopbar();
        focusDialog(document.getElementById("assistantDrawerRoot"));
        showToast(state.aiDraft ? "问题已带入 AI 助手" : "AI 助手已带入当前上下文");
        return;
      }

      if (event.target.closest("[data-ai-close]")) {
        closeAssistantDrawer();
        return;
      }

      const aiPrompt = event.target.closest("[data-ai-prompt]");
      if (aiPrompt) {
        state.aiDraft = aiPrompt.dataset.aiPrompt;
        state.aiAnswerReady = false;
        renderAssistantDrawer();
        showToast(`已填入：${aiPrompt.dataset.aiPrompt}`);
        return;
      }

      if (event.target.closest("[data-ai-send]")) {
        state.aiAnswerReady = true;
        renderAssistantDrawer();
        showToast("已生成回答草稿，引用来源可追溯");
        return;
      }

      if (event.target.closest("[data-ai-retry]")) {
        state.aiAnswerReady = false;
        renderAssistantDrawer();
        showToast("已回到待发送状态");
        return;
      }

      const docTabJump = event.target.closest("[data-doc-tab-jump]");
      if (docTabJump) {
        state.selectedDocTab = docTabJump.dataset.docTabJump;
        state.screen = "docs";
        state.selectedQuickId = "";
        state.kbAskOpen = false;
        state.aiDrawerOpen = false;
        renderContent();
        return;
      }

      const docTabTarget = event.target.closest("[data-doc-tab]");
      if (docTabTarget) {
        state.selectedDocTab = docTabTarget.dataset.docTab;
        state.screen = "docs";
        state.selectedQuickId = "";
        state.kbAskOpen = false;
        state.aiDrawerOpen = false;
        renderContent();
        return;
      }

      const screenTarget = event.target.closest("[data-screen]");
      if (screenTarget) {
        navigateToScreen(screenTarget.dataset.screen, { resetKnowledgeTab: screenTarget.dataset.screen === "knowledge" });
        return;
      }

      const scopeTarget = event.target.closest("[data-scope]");
      if (scopeTarget) {
        state.selectedScope = scopeTarget.dataset.scope;
        renderContent();
        return;
      }

      if (event.target.closest("[data-open-modal]")) {
        lastFocusedElement = document.activeElement;
        const modal = document.getElementById("linkModal");
        modal.classList.remove("closing");
        modal.classList.add("show");
        focusDialog(modal);
        return;
      }

      if (event.target.closest("[data-close-modal]")) {
        closeStaticModal("linkModal");
        return;
      }

      if (event.target.closest("[data-kb-ask-send]")) {
        const input = document.querySelector("[data-kb-ask-input]");
        if (!input?.value.trim()) {
          showToast("请输入问题后发送");
          return;
        }
        state.kbAskAnswer = `${prototypeAnswer(input.value.trim())}（回答范围：${state.selectedKbName}）`;
        renderContent();
        return;
      }

      const kbAsk = event.target.closest("[data-kb-ask]");
      if (kbAsk) {
        state.selectedKbName = kbAsk.dataset.kbAsk || state.selectedKbName;
        if (state.screen === "knowledge") {
          state.kbAskOpen = true;
          state.kbAskAnswer = "";
          state.aiDrawerOpen = false;
          renderContent();
        } else {
          state.aiContext = "knowledgeDetail";
          state.aiDraft = "";
          state.aiDrawerOpen = true;
          state.kbAskOpen = false;
          renderAssistantDrawer();
        }
        showToast(`问答范围已限定为「${state.selectedKbName}」`);
        return;
      }

      if (event.target.closest("[data-kb-ask-close]")) {
        state.kbAskOpen = false;
        renderContent();
        return;
      }

      const toastTarget = event.target.closest("[data-toast]");
      if (toastTarget) showToast(toastTarget.dataset.toast);

      if (state.kbDocMenuName && !event.target.closest(".kb-doc-row.menu-open")) {
        state.kbDocMenuName = "";
        renderContent();
      }
      if (state.myDocMenuName && !event.target.closest(".my-doc-row.menu-open")) {
        state.myDocMenuName = "";
        renderContent();
      }
    });

    document.addEventListener("keydown", (event) => {
      const keyboardKnowledgeCard = event.target.closest("[data-kb-card-open][tabindex='0']");
      if (keyboardKnowledgeCard && (event.key === "Enter" || event.key === " ")) {
        event.preventDefault();
        keyboardKnowledgeCard.click();
        return;
      }
      const keyboardDocumentTarget = event.target.closest("[data-open-document][tabindex='0']");
      if (keyboardDocumentTarget && (event.key === "Enter" || event.key === " ")) {
        event.preventDefault();
        keyboardDocumentTarget.click();
        return;
      }
      if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "k") {
        event.preventDefault();
        const search = document.getElementById("globalSearch");
        search.focus();
        search.select();
        return;
      }
      const activeDialog = document.querySelector(".modal-mask.show, .mobile-nav-drawer");
      if (event.key === "Tab" && activeDialog) {
        const focusable = [...activeDialog.querySelectorAll("button:not(:disabled), [href], input:not(:disabled), textarea:not(:disabled), select:not(:disabled), [tabindex]:not([tabindex='-1'])")].filter((item) => item.offsetParent !== null);
        if (focusable.length) {
          const first = focusable[0];
          const last = focusable[focusable.length - 1];
          if (event.shiftKey && document.activeElement === first) { event.preventDefault(); last.focus(); }
          else if (!event.shiftKey && document.activeElement === last) { event.preventDefault(); first.focus(); }
        }
      }
      if (event.key === "Enter" && (event.metaKey || event.ctrlKey)) {
        const modeInput = event.target.closest("[data-home-mode-input]");
        if (modeInput?.value.trim()) document.querySelector("[data-home-mode-send]")?.click();
        const followupInput = event.target.closest("[data-home-conversation-input]");
        if (followupInput?.value.trim()) document.querySelector("[data-home-followup-send]")?.click();
      }
      if (event.key !== "Escape") return;
      const guideModal = document.getElementById("guideModal");
      const linkModal = document.getElementById("linkModal");
      closeActionPanel({ immediate: true });
      if (state.moreMenuOpen) {
        state.moreMenuOpen = false;
        renderSideNav();
      }
      if (state.createTypeMenuOpen) {
        state.createTypeMenuOpen = false;
        renderSideNav();
      }
      if (state.aiDrawerOpen) {
        closeAssistantDrawer({ immediate: true });
      }
      if (state.homeKbMenuOpen) {
        state.homeKbMenuOpen = false;
        renderContent();
      }
      if (state.kbDocMenuName) {
        state.kbDocMenuName = "";
        renderContent();
      }
      if (state.myDocMenuName) {
        state.myDocMenuName = "";
        renderContent();
      }
      if (state.mobileNavOpen) {
        state.mobileNavOpen = false;
        renderMobileTopbar();
        renderMobileNav();
      }
      if (guideModal.classList.contains("show")) closeStaticModal("guideModal", { immediate: true });
      if (linkModal.classList.contains("show")) closeStaticModal("linkModal", { immediate: true });
    });

    document.addEventListener("input", (event) => {
      const editorSurface = event.target.closest(".editor-surface");
      if (editorSurface) {
        state.editorDraftHtml = editorSurface.innerHTML;
        state.editorDirty = true;
      }
      const catalogInput = event.target.closest("[data-catalog-search]");
      if (catalogInput) {
        const caret = catalogInput.selectionStart ?? catalogInput.value.length;
        state.catalogQuery = catalogInput.value;
        renderContent();
        requestAnimationFrame(() => {
          const nextInput = document.querySelector("[data-catalog-search]");
          if (!nextInput) return;
          nextInput.focus();
          nextInput.setSelectionRange(caret, caret);
        });
        return;
      }
      const driveSearchInput = event.target.closest("[data-drive-search]");
      if (driveSearchInput) {
        const caret = driveSearchInput.selectionStart ?? driveSearchInput.value.length;
        state.query = driveSearchInput.value;
        renderContent();
        requestAnimationFrame(() => {
          const nextInput = document.querySelector("[data-drive-search]");
          if (!nextInput) return;
          nextInput.focus();
          nextInput.setSelectionRange(caret, caret);
        });
        return;
      }
      const modeInput = event.target.closest("[data-home-mode-input]");
      if (modeInput) {
        state.homeAiDrafts[modeInput.dataset.homeModeInput] = modeInput.value;
        const send = document.querySelector("[data-home-mode-send]");
        const disabled = !modeInput.value.trim();
        if (send) {
          send.disabled = disabled;
          send.setAttribute("aria-disabled", String(disabled));
        }
      }
      const followupInput = event.target.closest("[data-home-conversation-input]");
      if (followupInput) {
        const send = document.querySelector("[data-home-followup-send]");
        const disabled = !followupInput.value.trim();
        if (send) {
          send.disabled = disabled;
          send.setAttribute("aria-disabled", String(disabled));
        }
      }
      const assistantInput = event.target.closest("[data-ai-input]");
      if (assistantInput) {
        state.aiDraft = assistantInput.value;
        const send = document.querySelector("[data-ai-send]");
        const disabled = !assistantInput.value.trim();
        if (send) {
          send.disabled = disabled;
          send.setAttribute("aria-disabled", String(disabled));
        }
      }
    });

    document.getElementById("globalSearch").addEventListener("input", (event) => {
      state.query = event.target.value;
      renderContent();
    });

    const syncAmbientMotionVisibility = () => {
      document.documentElement.classList.toggle("ambient-motion-paused", document.hidden);
    };
    document.addEventListener("visibilitychange", syncAmbientMotionVisibility);
    syncAmbientMotionVisibility();

    renderRail();
    renderContent();
    try {
      if (!localStorage.getItem("tuichat-guide-seen")) {
        window.setTimeout(() => {
          const guide = document.getElementById("guideModal");
          guide.classList.add("show");
          focusDialog(guide);
        }, 320);
      }
    } catch (error) {}
  </script>
</body>
</html>
