<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>360 云文档 · 知识工作台优化方案 v4</title>
  <style>
    :root {
      --fs-primary: #2F6BDB;
      --fs-primary-hover: #3F7BE8;
      --fs-primary-active: #2559BA;
      --fs-primary-light: #E9F1FF;
      --fs-text-title: rgba(30, 30, 28, 0.92);
      --fs-text-body: rgba(30, 30, 28, 0.84);
      --fs-text-secondary: rgba(30, 30, 28, 0.58);
      --fs-text-tertiary: rgba(30, 30, 28, 0.42);
      --fs-text-placeholder: rgba(30, 30, 28, 0.36);
      --fs-text-disabled: rgba(30, 30, 28, 0.24);
      --fs-bg-body: #FBFAF8;
      --fs-bg-sidebar: #F6F5F2;
      --fs-bg-fill: #F1F0ED;
      --fs-bg-hover: #F7F6F3;
      --fs-bg-selected: #EEF3FA;
      --fs-border: rgba(46, 42, 37, 0.14);
      --fs-divider: rgba(46, 42, 37, 0.10);
      --fs-success: #12CD7A;
      --fs-warning: #FFAB2E;
      --fs-error: #FF4D48;
      --fs-radius-sm: 4px;
      --fs-radius-md: 6px;
      --fs-radius-lg: 8px;
      --fs-radius-xl: 12px;
      --fs-radius-full: 999px;
      --fs-shadow-sm: 0 1px 2px rgba(31, 35, 41, 0.04), 0 8px 24px rgba(31, 35, 41, 0.05);
      --fs-shadow-md: 0 1px 3px rgba(31, 35, 41, 0.05), 0 14px 32px rgba(31, 35, 41, 0.10);
      --fs-shadow-fab: 0 6px 18px rgba(47,107,219,0.24);
      --fs-ease-out: cubic-bezier(0.23, 1, 0.32, 1);
      --fs-ease-standard: cubic-bezier(0.77, 0, 0.175, 1);
      --fs-motion-fast: 140ms;
      --fs-motion-medium: 190ms;
      --fs-font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      color: var(--fs-text-title);
      background: #E8EEF6;
      font-family: var(--fs-font);
      font-size: 14px;
      line-height: 1.6;
      letter-spacing: 0;
      text-rendering: optimizeLegibility;
      font-variant-numeric: tabular-nums;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(46,42,37,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(46,42,37,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.10;
    }

    ::selection {
      background: rgba(47, 107, 219, 0.16);
      color: var(--fs-text-title);
    }

    button, input, textarea { font-family: inherit; }
    button { cursor: pointer; }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible {
      outline: 2px solid rgba(47, 107, 219, 0.35);
      outline-offset: 2px;
    }

    .side-scroll,
    .content,
    .doc-canvas,
    .ai-side {
      scrollbar-width: thin;
      scrollbar-color: rgba(46, 42, 37, 0.20) transparent;
    }

    .side-scroll::-webkit-scrollbar,
    .content::-webkit-scrollbar,
    .doc-canvas::-webkit-scrollbar,
    .ai-side::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .side-scroll::-webkit-scrollbar-thumb,
    .content::-webkit-scrollbar-thumb,
    .doc-canvas::-webkit-scrollbar-thumb,
    .ai-side::-webkit-scrollbar-thumb {
      border: 3px solid transparent;
      border-radius: var(--fs-radius-full);
      background: rgba(46, 42, 37, 0.20);
      background-clip: content-box;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: 100vw;
      height: 100vh;
      padding: 8px;
      background: linear-gradient(180deg, #EDF3FA 0%, #E5ECF4 100%);
    }

    .desktop {
      width: 100%;
      height: 100%;
      min-width: 0;
      display: flex;
      overflow: hidden;
      border: 1px solid rgba(46, 42, 37, 0.08);
      border-radius: 10px;
      background: #FFFFFF;
      box-shadow: 0 20px 48px rgba(44, 58, 78, 0.14);
    }

    .left-rail {
      width: 68px;
      flex: 0 0 68px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 12px 6px;
      background: #EAF0F7;
      border-right: 1px solid rgba(46, 42, 37, 0.08);
    }

    .mac-dots {
      width: 48px;
      display: flex;
      gap: 6px;
    }

    .mac-dots span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .mac-dots span:nth-child(1) { background: #EC695E; }
    .mac-dots span:nth-child(2) { background: #F5BE4F; }
    .mac-dots span:nth-child(3) { background: #61C454; }

    .avatar {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: var(--fs-radius-md);
      background: #FFFFFF;
      color: var(--fs-primary);
      font-size: 16px;
      font-weight: 600;
      box-shadow: var(--fs-shadow-sm);
    }

    .rail-group {
      width: 56px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .rail-spacer { flex: 1; }

    .rail-item {
      width: 56px;
      height: 48px;
      border: 0;
      border-radius: var(--fs-radius-sm);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      background: transparent;
      color: #3E506A;
      font-size: 10px;
    }

    .rail-item.active { background: #FFFFFF; color: var(--fs-primary); box-shadow: var(--fs-shadow-sm); }

    .sidebar {
      width: 272px;
      flex: 0 0 272px;
      display: flex;
      flex-direction: column;
      padding: 22px 12px 16px;
      border-right: 1px solid var(--fs-divider);
      background: #FBFAF8;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6px;
      margin-bottom: 16px;
    }

    .brand-actions {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 22px;
      line-height: 30px;
      font-weight: 600;
    }

    .global-search {
      position: relative;
      margin: 0 4px 14px;
    }

    .global-search input {
      width: 100%;
      height: 34px;
      padding: 0 48px 0 34px;
      border: 1px solid transparent;
      border-radius: var(--fs-radius-md);
      background: var(--fs-bg-fill);
      color: var(--fs-text-title);
      font-size: 14px;
    }

    .global-search input:focus {
      border-color: var(--fs-primary);
      background: #FFFFFF;
      box-shadow: 0 0 0 2px rgba(47, 107, 219, 0.12);
    }

    .global-search .search-icon {
      position: absolute;
      top: 8px;
      left: 10px;
      color: var(--fs-text-tertiary);
    }

    .keycap {
      position: absolute;
      top: 7px;
      right: 8px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      padding: 0 6px;
      border: 1px solid var(--fs-divider);
      border-radius: var(--fs-radius-sm);
      color: var(--fs-text-tertiary);
      background: #FFFFFF;
      font-size: 12px;
    }

    .side-scroll {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }

    .nav-group {
      padding: 8px 0 10px;
      border-top: 1px solid var(--fs-divider);
    }

    .nav-group:first-child { border-top: 0; padding-top: 0; }

    .nav-title {
      width: 100%;
      border: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 26px;
      padding: 0 8px;
      background: transparent;
      color: var(--fs-text-tertiary);
      font-size: 12px;
      line-height: 20px;
      text-align: left;
      cursor: pointer;
      transition: color var(--fs-motion-fast) var(--fs-ease-out);
    }

    .nav-title .icon {
      transition: transform var(--fs-motion-fast) var(--fs-ease-out);
    }

    .nav-group.is-collapsed .nav-title .icon {
      transform: rotate(-90deg);
    }

    .nav-group.is-collapsed .side-item,
    .nav-group.is-collapsed .quick-list {
      display: none;
    }

    .side-item {
      width: 100%;
      height: 38px;
      border: 0;
      border-radius: var(--fs-radius-lg);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      background: transparent;
      color: var(--fs-text-title);
      font-size: 14px;
      font-weight: 500;
      text-align: left;
    }

    .side-item.active { background: var(--fs-bg-selected); color: var(--fs-primary); }

    .quick-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .quick-item {
      width: 100%;
      height: 30px;
      border: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 8px;
      border-radius: var(--fs-radius-md);
      background: transparent;
      color: var(--fs-text-secondary);
      font-size: 13px;
      text-align: left;
      cursor: pointer;
    }

    .quick-item span:last-child {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .quick-item.active {
      background: var(--fs-bg-selected);
      color: var(--fs-primary);
      font-weight: 500;
    }

    .file-badge {
      width: 28px;
      height: 22px;
      flex: 0 0 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      border: 1px solid transparent;
      font-size: 9px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0;
    }

    .file-badge.doc {
      color: #2f6bdb;
      background: #eaf2ff;
      border-color: rgba(47, 107, 219, 0.12);
    }

    .file-badge.kb {
      color: #6b4fd8;
      background: #f1ecff;
      border-color: rgba(107, 79, 216, 0.14);
    }

    .file-badge.xls {
      color: #168a4a;
      background: #e9f8f0;
      border-color: rgba(22, 138, 74, 0.12);
    }

    .file-badge.pdf {
      color: #d93025;
      background: #fff0f0;
      border-color: rgba(217, 48, 37, 0.14);
    }

    .file-badge.folder {
      color: #9a6500;
      background: #fff5d8;
      border-color: rgba(154, 101, 0, 0.14);
    }

    .quick-item.active .file-badge {
      color: var(--fs-primary);
      background: #fff;
      border-color: rgba(47, 107, 219, 0.18);
    }

    .workspace {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: #FFFFFF;
    }

    .topbar {
      height: 62px;
      flex: 0 0 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 24px;
      border-bottom: 1px solid var(--fs-divider);
      background: rgba(255,255,255,0.96);
      backdrop-filter: saturate(1.1) blur(8px);
    }

    .page-title {
      margin: 0;
      color: var(--fs-text-title);
      font-size: 18px;
      line-height: 26px;
      font-weight: 600;
    }

    .topbar-actions, .row, .tag-row, .action-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .content {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 22px 24px;
      background: #FFFFFF;
    }

    .content.soft {
      background: linear-gradient(180deg, rgba(246,245,242,0.84) 0, rgba(255,255,255,0) 210px), #FFFFFF;
    }

    .content.flat {
      padding: 0;
      background: #FFFFFF;
    }

    .btn {
      height: 32px;
      border: 1px solid var(--fs-border);
      border-radius: var(--fs-radius-md);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 12px;
      background: #FFFFFF;
      color: var(--fs-text-title);
      font-size: 14px;
      white-space: nowrap;
      transition: background var(--fs-motion-fast) var(--fs-ease-out), border-color var(--fs-motion-fast) var(--fs-ease-out), color var(--fs-motion-fast) var(--fs-ease-out), transform 120ms var(--fs-ease-out), box-shadow var(--fs-motion-fast) var(--fs-ease-out);
    }

    .btn:active { transform: scale(0.98); }

    .btn.primary {
      border-color: var(--fs-primary);
      background: var(--fs-primary);
      color: #FFFFFF;
      font-weight: 500;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 3px 10px rgba(47,107,219,0.16);
    }

    .btn.text {
      border-color: transparent;
      background: transparent;
      color: var(--fs-primary);
    }

    .btn.compact {
      height: 28px;
      padding: 0 10px;
      font-size: 13px;
    }

    .icon-button {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: var(--fs-radius-md);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--fs-text-secondary);
      background: transparent;
      transition: background var(--fs-motion-fast) var(--fs-ease-out), color var(--fs-motion-fast) var(--fs-ease-out), transform 120ms var(--fs-ease-out);
    }

    .icon-button:active { transform: scale(0.96); }

    .brand-actions .icon-button {
      width: 28px;
      height: 28px;
      color: rgba(30, 30, 28, 0.58);
    }

    .brand-svg-icon {
      width: 18px;
      height: 18px;
      display: block;
      overflow: visible;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .icon {
      --icon: none;
      width: 18px;
      height: 18px;
      display: inline-flex;
      flex: 0 0 auto;
      color: currentColor;
      background-color: currentColor;
      -webkit-mask: var(--icon) center / contain no-repeat;
      mask: var(--icon) center / contain no-repeat;
    }

          </div>
        </div>
      `;
    }

    function normalizeRecentDoc(doc, action = "继续") {
      return {
        ...doc,
        meta: `${doc.access} · ${doc.reason} · ${doc.kb}`,
        action
      };
    }

    function normalizeOwnedDoc(doc, action = "打开") {
      return {
        ...doc,
        meta: `${doc.owner} · ${doc.time} · ${doc.kb}`,
        action
      };
    }

    function statusTone(status) {
      if (status === "已关联") return "green";
      if (status === "过期提醒") return "orange";
      if (status === "待关联" || status === "待复核") return "blue";
      return "";
    }

    function getMyDocView(tabId) {
      const pendingDocs = docs.filter((doc) => doc.relation === "待我处理" || doc.status === "待复核" || doc.status === "过期提醒");
      const unlinkedDocs = [
        ...recentDocs.filter((doc) => doc.status === "待关联").map((doc) => normalizeRecentDoc(doc, "关联")),
        normalizeRecentDoc({ name: "采购凭证截图归档", type: "doc", owner: "胡玉彪", access: "昨天 17:46", reason: "等待选择归属知识库", kb: "未关联", status: "待关联" }, "关联"),
        normalizeRecentDoc({ name: "HULK 数据库实例容量展示对接云舟", type: "word", owner: "岳明强", access: "06-26", reason: "从文档空间同步", kb: "未关联", status: "待关联" }, "关联")
      ];
      const views = {
        recent: {
          desc: "默认回到最近打开的文档，适合继续编辑、引用和复核。",
          items: recentDocs.map((doc) => normalizeRecentDoc(doc))
        },
        created: {
          desc: "只看由我创建或归属我维护的文档，便于持续更新和权限管理。",
          items: docs.filter((doc) => doc.relation === "我创建").map((doc) => normalizeOwnedDoc(doc))
        },
        shared: {
          desc: "集中查看别人共享给我的文档，保留来源人、时间和关联知识库状态。",
          items: docs.filter((doc) => doc.relation === "与我共享").map((doc) => normalizeOwnedDoc(doc))
        },
        pending: {
          desc: "汇总需要我复核、处理过期提醒或补充确认的文档。",
          items: pendingDocs.map((doc) => normalizeOwnedDoc(doc, "处理"))
        },
        unlinked: {
          desc: "这些文档尚未沉淀到知识库，建议补充归属后再用于问答。",
          items: unlinkedDocs
        }
      };
      return views[tabId] || views.recent;
    }

          title: "知识广场 AI 助手",
          scope: "知识广场",
          desc: "已带入当前分类、可信来源和发布前密级检查状态。",
          chips: ["可信来源", "公开资源", "发布检查"],
          message: "可以先问再加入，判断某个公开知识库是否覆盖你的问题。",
          prompts: ["哪个知识库适合研发效能问题？", "加入前需要检查哪些权限？", "找一份办公服务相关资料"],
          placeholder: "基于知识广场资源提问"
        },
        drive: {
          title: "云盘 AI 助手",
          scope: "云盘文件 · 效能工程部",
          desc: "已带入当前文件夹、文件列表、入库状态和摘要状态。",
          chips: ["当前文件夹", "可索引 42 个文件", "入库动作"],
          message: "可以对当前文件夹提问、批量摘要，或判断哪些文件应进入知识库。",
          prompts: ["当前文件夹有哪些资料适合入库？", "把这些压缩包生成摘要", "哪些文件还不能用于问答？"],
          placeholder: "基于当前云盘文件夹提问"
        },
        tools: {
          title: "知识工具 AI 助手",
          scope: "知识工具 · 推荐工具",
          desc: "已带入当前工具分类、可引用知识库和工具任务。",
          chips: ["推荐工具", "流程任务", "可引用知识库"],
          message: "可以帮你选择工具，也可以把当前材料转成审阅、纪要、归档或批量摘要任务。",
          prompts: ["我应该用哪个工具处理周报？", "把多人收集任务配置成流程", "哪些工具需要先关联知识库？"],
          placeholder: "基于当前工具任务提问"
        }
      };
      return contexts[context] || contexts.home;
    }

    function renderAssistantDrawer() {
      const root = document.getElementById("assistantDrawerRoot");
      if (!state.aiDrawerOpen) {
        root.innerHTML = "";
        return;
      }
      const ctx = getAssistantContext();
      root.innerHTML = `
        <div class="assistant-layer" role="presentation">
          <div class="assistant-scrim" data-ai-close></div>
          <aside class="assistant-drawer" role="dialog" aria-modal="false" aria-label="${ctx.title}">
            <div class="assistant-head">
              <div>
                <h2>${ctx.title}</h2>
                <p>${ctx.scope}</p>
              </div>
              <button class="icon-button" type="button" data-ai-close aria-label="关闭 AI 助手"><span class="icon close"></span></button>
            </div>
            <div class="assistant-body">
              <div class="assistant-context">
                <strong>已带入上下文</strong>
                <p>${ctx.desc}</p>
                <div class="tag-row">${ctx.chips.map((chip) => `<span class="tag blue">${chip}</span>`).join("")}</div>
              </div>
              <div class="assistant-message">
                <strong>可以这样问</strong>
                ${ctx.message}
              </div>
              ${state.aiDraft && !state.aiAnswerReady ? `
                <div class="assistant-progress" aria-live="polite">
                  <strong>待发送问题</strong>
                  <p class="muted">${state.aiDraft}</p>
                  <ol>
                    <li>确认知识范围：${ctx.scope}</li>
                    <li>检索权限内文档与最近上下文</li>
                    <li>生成答案后展示引用和过滤记录</li>
                  </ol>
                </div>
              ` : ""}
              ${state.aiAnswerReady ? `
                <div class="assistant-result" aria-live="polite">
                  <h3>回答草稿</h3>
                  <p>已基于「${ctx.scope}」整理出可用结论，并过滤 1 条无权限资料。建议先补齐项目编号和负责人确认截图，再保存到当前文档。</p>
                  <div class="citation-list">
                    <div class="citation-item">引用 1：AI 工具订阅报销规则汇总 · 更新于 12 分钟前 · 有权限</div>
                    <div class="citation-item">引用 2：报销与采购 FAQ · 常规密级 · 可插入来源</div>
                    <div class="citation-item">过滤记录：1 篇保密复盘文档未进入答案</div>
                  </div>
                  <div class="action-row" style="margin-top: 12px;">
                    <button class="btn compact primary" type="button" data-toast="已保存到当前文档">${icon("doc")}保存到文档</button>
                    <button class="btn compact" type="button" data-toast="已复制引用来源">${icon("doc")}复制引用</button>
                    <button class="btn compact" type="button" data-ai-retry>${icon("arrow")}重新生成</button>
                  </div>
                </div>
              ` : ""}
              <div class="assistant-prompts">
                ${ctx.prompts.map((prompt) => `
                  <button class="assistant-prompt" type="button" data-ai-prompt="${prompt}">
                    <span>${prompt}</span><span class="arrow-chip">${icon("arrow")}</span>
                  </button>
                `).join("")}
              </div>
            </div>
            <div class="assistant-footer">
              <div class="ai-composer">
                <textarea placeholder="${ctx.placeholder}">${state.aiDraft}</textarea>
                <div class="composer-toolbar">
                  <span class="tag blue">${icon("shield")}权限内检索</span>
                  <button class="btn compact primary" type="button" data-ai-send>${icon("send")}发送</button>
                </div>
              </div>
            </div>
          </aside>
        </div>
      `;
    }

    function renderContent() {
      const content = document.getElementById("content");
      const map = {
        home: renderHome,
        spaces: renderSpaces,
        docs: renderMyDocs,
        editor: renderEditor,
        ai: renderAi,
        knowledge: renderKnowledge,
        knowledgeDetail: renderKnowledgeDetail,
        discover: renderDiscover,
        drive: renderDrive,
        tools: renderTools
      };
      content.className = state.screen === "editor" ? "content flat" : "content soft";
      content.innerHTML = (map[state.screen] || renderHome)();
      renderTopbar();
      renderSideNav();
      renderAssistantDrawer();
    }

    document.addEventListener("click", (event) => {
      const quickTarget = event.target.closest("[data-quick-item]");
      if (quickTarget) {
        const quickItem = quickItems.find((item) => item.id === quickTarget.dataset.quickItem);
        if (quickItem) {
          state.selectedQuickId = quickItem.id;
          state.screen = quickItem.screen;
          if (quickItem.kbName) state.selectedKbName = quickItem.kbName;
          if (state.screen !== "knowledge") state.kbAskOpen = false;
          state.aiDrawerOpen = false;
          renderContent();
          showToast(`${quickItem.label} 已打开`);
        }
        return;
      }

      const groupToggle = event.target.closest("[data-toggle-group]");
      if (groupToggle) {
        const groupId = groupToggle.dataset.toggleGroup;
        state.collapsedNavGroups = isNavGroupCollapsed(groupId)
          ? state.collapsedNavGroups.filter((id) => id !== groupId)
          : [...state.collapsedNavGroups, groupId];
        renderSideNav();
        return;
      }

      const kbOpen = event.target.closest("[data-kb-open]");
      if (kbOpen) {
        state.selectedQuickId = "";
        state.selectedKbName = kbOpen.dataset.kbOpen || state.selectedKbName;
        state.screen = "knowledgeDetail";
        state.kbAskOpen = false;
        state.aiDrawerOpen = false;
        state.homeKbMenuOpen = false;
        renderContent();
        showToast(`${state.selectedKbName} 已打开`);
        return;
      }

      if (event.target.closest("[data-guide-ai]")) {
        document.getElementById("guideModal").classList.remove("show");
        state.screen = "home";
        state.selectedQuickId = "";
        state.selectedScope = "全部知识库";
        state.kbAskOpen = false;
        state.aiContext = "home";
        state.aiDraft = "";
        state.aiDrawerOpen = true;
        state.homeKbMenuOpen = false;
        renderContent();
        showToast("AI 助手已带入首页上下文");
        return;
      }

      if (event.target.closest("[data-guide-close]")) {
        document.getElementById("guideModal").classList.remove("show");
        return;
      }

      const homeKbOption = event.target.closest("[data-home-kb-option]");
      if (homeKbOption) {
        state.homeKbScope = homeKbOption.dataset.homeKbOption;
        state.selectedScope = state.homeKbScope;
        state.homeKbMenuOpen = false;
        renderContent();
        showToast(`已选择：${state.homeKbScope}`);
        return;
      }

      if (event.target.closest("[data-home-kb-toggle]")) {
        state.homeKbMenuOpen = !state.homeKbMenuOpen;
        renderContent();
        return;
      }

      const aiTarget = event.target.closest("[data-ai-assistant]");
      if (aiTarget) {
        state.aiContext = aiTarget.dataset.aiAssistant || state.screen || "home";
        state.aiDraft = aiTarget.dataset.aiPrompt || "";
        state.aiAnswerReady = false;
        state.aiDrawerOpen = true;
        state.kbAskOpen = false;
        state.homeKbMenuOpen = false;
        renderAssistantDrawer();
        showToast(state.aiDraft ? "问题已带入 AI 助手" : "AI 助手已带入当前上下文");
        return;
      }

      if (event.target.closest("[data-ai-close]")) {
        state.aiDrawerOpen = false;
        renderAssistantDrawer();
        return;
      }

      const aiPrompt = event.target.closest("[data-ai-prompt]");
      if (aiPrompt) {
        state.aiDraft = aiPrompt.dataset.aiPrompt;
        state.aiAnswerReady = false;
        renderAssistantDrawer();
        showToast(`已填入：${aiPrompt.dataset.aiPrompt}`);
        return;
      }

      if (event.target.closest("[data-ai-send]")) {
        state.aiAnswerReady = true;
        renderAssistantDrawer();
        showToast("已生成回答草稿，引用来源可追溯");
        return;
      }

      if (event.target.closest("[data-ai-retry]")) {
        state.aiAnswerReady = false;
        renderAssistantDrawer();
        showToast("已回到待发送状态");
        return;
      }

      const docTabJump = event.target.closest("[data-doc-tab-jump]");
      if (docTabJump) {
        state.selectedDocTab = docTabJump.dataset.docTabJump;
        state.screen = "docs";
        state.selectedQuickId = "";
        state.kbAskOpen = false;
        state.aiDrawerOpen = false;
        renderContent();
        return;
      }

      const docTabTarget = event.target.closest("[data-doc-tab]");
      if (docTabTarget) {
        state.selectedDocTab = docTabTarget.dataset.docTab;
        state.screen = "docs";
        state.selectedQuickId = "";
        state.kbAskOpen = false;
        state.aiDrawerOpen = false;
        renderContent();
        return;
      }

      const screenTarget = event.target.closest("[data-screen]");
      if (screenTarget) {
        state.screen = screenTarget.dataset.screen;
        state.selectedQuickId = "";
        if (state.screen === "docs") state.selectedDocTab = "recent";
        if (state.screen !== "knowledge") state.kbAskOpen = false;
        state.aiDrawerOpen = false;
        state.homeKbMenuOpen = false;
        renderContent();
        return;
      }

      const scopeTarget = event.target.closest("[data-scope]");
      if (scopeTarget) {
        state.selectedScope = scopeTarget.dataset.scope;
        renderContent();
        return;
      }

      if (event.target.closest("[data-open-modal]")) {
        document.getElementById("linkModal").classList.add("show");
        return;
      }

      if (event.target.closest("[data-close-modal]")) {
        document.getElementById("linkModal").classList.remove("show");
      }

      const kbAsk = event.target.closest("[data-kb-ask]");
      if (kbAsk) {
        state.selectedKbName = kbAsk.dataset.kbAsk || state.selectedKbName;
        state.aiContext = state.screen === "knowledgeDetail" ? "knowledgeDetail" : "knowledge";
        state.aiDraft = "";
        state.aiDrawerOpen = true;
        state.kbAskOpen = false;
        renderContent();
        showToast("AI 助手已限定当前知识库");
        return;
      }

      if (event.target.closest("[data-kb-ask-close]")) {
        state.kbAskOpen = false;
        renderContent();
        return;
      }

      const toastTarget = event.target.closest("[data-toast]");
      if (toastTarget) showToast(toastTarget.dataset.toast);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key !== "Escape") return;
      const guideModal = document.getElementById("guideModal");
      const linkModal = document.getElementById("linkModal");
      if (state.aiDrawerOpen) {
        state.aiDrawerOpen = false;
        renderAssistantDrawer();
      }
      if (state.homeKbMenuOpen) {
        state.homeKbMenuOpen = false;
        renderContent();
      }
      if (guideModal.classList.contains("show")) guideModal.classList.remove("show");
      if (linkModal.classList.contains("show")) linkModal.classList.remove("show");
    });

    document.getElementById("globalSearch").addEventListener("input", (event) => {
      state.query = event.target.value;
      renderContent();
    });

    renderRail();
    renderContent();
  </script>
</body>
</html>
