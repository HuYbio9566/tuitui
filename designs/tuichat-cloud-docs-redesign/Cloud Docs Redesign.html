<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>360 云文档 · 企业知识工作台改版方案</title>
  <style>
    :root {
      --fs-primary: #3873FA;
      --fs-primary-hover: #5588FB;
      --fs-primary-active: #2A5FDB;
      --fs-primary-light: #EAF2FF;
      --fs-text-title: #333333;
      --fs-text-body: #333333;
      --fs-text-secondary: #666666;
      --fs-text-tertiary: #8A8F99;
      --fs-text-placeholder: #999999;
      --fs-text-disabled: #CCCCCC;
      --fs-text-link: #3873FA;
      --fs-bg-body: #FFFFFF;
      --fs-bg-sidebar: #F6F8FB;
      --fs-bg-fill: #F2F4F7;
      --fs-bg-hover: #F7F9FA;
      --fs-bg-selected: #EDF3FF;
      --fs-border: #DDDDDD;
      --fs-divider: #EEEEEE;
      --fs-success: #12CD7A;
      --fs-warning: #FFAB2E;
      --fs-error: #FF4D48;
      --fs-radius-sm: 4px;
      --fs-radius-md: 6px;
      --fs-radius-lg: 8px;
      --fs-radius-xl: 12px;
      --fs-radius-full: 999px;
      --fs-space-1: 4px;
      --fs-space-2: 8px;
      --fs-space-3: 12px;
      --fs-space-4: 16px;
      --fs-space-5: 20px;
      --fs-space-6: 24px;
      --fs-shadow-sm: 0 1px 4px rgba(51, 51, 51, 0.06);
      --fs-shadow-md: 0 4px 12px rgba(51, 51, 51, 0.10);
      --fs-shadow-fab: 0 4px 12px rgba(56, 115, 250, 0.30);
      --fs-font: -apple-system, "SF Pro Text", "PingFang SC", "Helvetica Neue", "Microsoft YaHei", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: #DDEBFF;
      color: var(--fs-text-title);
      font-family: var(--fs-font);
      text-rendering: geometricPrecision;
    }

    button,
    input,
    textarea {
      font-family: inherit;
    }

    button {
      cursor: pointer;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    .nav-item:focus-visible,
    .side-item:focus-visible,
    .chip:focus-visible {
      outline: 2px solid rgba(56, 115, 250, 0.36);
      outline-offset: 2px;
    }

    .app-shell {
      width: 100vw;
      height: 100vh;
      padding: 8px;
      background: linear-gradient(180deg, #E9F3FF 0%, #DCEBFF 100%);
    }

    .desktop {
      width: 100%;
      height: 100%;
      min-width: 1180px;
      display: flex;
      overflow: hidden;
      border-radius: 12px;
      background: var(--fs-bg-body);
      box-shadow: 0 10px 24px rgba(40, 76, 142, 0.16);
    }

    .left-rail {
      width: 68px;
      height: 100%;
      flex: 0 0 68px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--fs-space-4);
      padding: 12px 6px;
      background: #EAF4FF;
      border-right: 1px solid rgba(188, 212, 240, 0.72);
    }

    .mac-dots {
      width: 48px;
      display: flex;
      gap: 6px;
      padding-left: 0;
    }

    .mac-dots span {
      width: 12px;
      height: 12px;
      border-radius: var(--fs-radius-full);
    }

    .mac-dots span:nth-child(1) {
      background: #EC695E;
    }

    .mac-dots span:nth-child(2) {
      background: #F5BE4F;
    }

    .mac-dots span:nth-child(3) {
      background: #61C454;
    }

    .avatar {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: var(--fs-radius-md);
      background: #FFFFFF;
      color: var(--fs-primary);
      font-weight: 700;
      box-shadow: var(--fs-shadow-sm);
    }

    .rail-group {
      width: 56px;
      display: flex;
      flex-direction: column;
      gap: var(--fs-space-1);
    }

    .rail-spacer {
      flex: 1;
    }

    .rail-item {
      width: 56px;
      height: 48px;
      border: 0;
      border-radius: var(--fs-radius-sm);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      background: transparent;
      color: #3E506A;
      position: relative;
    }

    .rail-item:hover {
      background: rgba(255, 255, 255, 0.64);
    }

    .rail-item.active {
      background: #FFFFFF;
      color: var(--fs-primary);
      box-shadow: var(--fs-shadow-sm);
    }

    .rail-item span {
      font-size: 10px;
      line-height: 1;
    }

    .main-sidebar {
      width: 264px;
      flex: 0 0 264px;
      display: flex;
      flex-direction: column;
      padding: 22px 12px 16px;
      border-right: 1px solid var(--fs-divider);
      background: linear-gradient(180deg, #FFFFFF 0%, #F8FAFD 100%);
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      padding: 0 6px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: var(--fs-space-2);
      font-size: 22px;
      line-height: 30px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .brand-mark {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: var(--fs-radius-md);
      background: var(--fs-primary);
      color: #FFFFFF;
      font-size: 14px;
      font-weight: 700;
    }

    .icon-button {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: var(--fs-radius-md);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--fs-text-secondary);
      background: transparent;
    }

    .icon-button:hover {
      color: var(--fs-text-title);
      background: var(--fs-bg-hover);
    }

    .sidebar-tools {
      display: flex;
      gap: var(--fs-space-2);
    }

    .global-search {
      position: relative;
      margin: 0 4px 16px;
    }

    .global-search input {
      width: 100%;
      height: 34px;
      padding: 0 12px 0 34px;
      border: 1px solid transparent;
      border-radius: var(--fs-radius-md);
      background: var(--fs-bg-fill);
      color: var(--fs-text-title);
      font-size: 14px;
    }

    .global-search input:focus {
      border-color: var(--fs-primary);
      background: #FFFFFF;
      box-shadow: 0 0 0 2px rgba(56, 115, 250, 0.12);
    }

    .global-search .icon {
      position: absolute;
      top: 7px;
      left: 10px;
      color: var(--fs-text-tertiary);
    }

    .side-section {
      display: flex;
      flex-direction: column;
      gap: var(--fs-space-1);
      margin-bottom: 16px;
    }

    .side-item {
      height: 42px;
      border: 0;
      border-radius: var(--fs-radius-lg);
      display: flex;
      align-items: center;
      gap: var(--fs-space-3);
      padding: 0 12px;
      color: var(--fs-text-title);
      background: transparent;
      font-size: 14px;
      font-weight: 500;
      text-align: left;
    }

    .side-item:hover {
      background: var(--fs-bg-hover);
    }

    .side-item.active {
      background: var(--fs-bg-selected);
      color: var(--fs-primary);
    }

    .side-item .icon {
      flex: 0 0 20px;
    }

    .mini-section {
      padding: 12px 4px 0;
      border-top: 1px solid var(--fs-divider);
    }

    .mini-title {
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6px;
      color: var(--fs-text-tertiary);
      font-size: 12px;
      line-height: 20px;
    }

    .mini-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-top: 4px;
    }

    .mini-item {
      height: 30px;
      display: flex;
      align-items: center;
      gap: var(--fs-space-2);
      padding: 0 8px;
      border-radius: var(--fs-radius-md);
      color: var(--fs-text-secondary);
      font-size: 13px;
    }

    .mini-item:hover {
      background: var(--fs-bg-hover);
      color: var(--fs-text-title);
    }

    .workspace {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: #FFFFFF;
    }

    .workspace-topbar {
      height: 62px;
      flex: 0 0 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--fs-space-4);
      padding: 0 24px;
      border-bottom: 1px solid var(--fs-divider);
      background: rgba(255, 255, 255, 0.92);
    }

    .page-kicker {
      color: var(--fs-text-secondary);
      font-size: 12px;
      line-height: 18px;
    }

    .page-title {
      margin: 0;
      color: var(--fs-text-title);
      font-size: 18px;
      line-height: 26px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: var(--fs-space-2);
    }

    .content {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 24px;
      background:
        linear-gradient(180deg, rgba(246, 250, 255, 0.82) 0, rgba(255, 255, 255, 0) 210px),
        #FFFFFF;
    }

    .content.narrow {
      padding: 0;
      background: #FFFFFF;
    }

    .btn {
      height: 32px;
      border-radius: var(--fs-radius-md);
      border: 1px solid var(--fs-border);
      background: #FFFFFF;
      color: var(--fs-text-title);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--fs-space-2);
      padding: 0 12px;
      font-size: 14px;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--fs-bg-hover);
    }

    .btn.primary {
      border-color: var(--fs-primary);
      background: var(--fs-primary);
      color: #FFFFFF;
      font-weight: 500;
    }

    .btn.primary:hover {
      background: var(--fs-primary-hover);
    }

    .btn.text {
      border-color: transparent;
      background: transparent;
      color: var(--fs-primary);
    }

    .btn.compact {
      height: 28px;
      padding: 0 10px;
      font-size: 13px;
    }

    .icon {
      --icon: none;
      width: 18px;
      height: 18px;
      display: inline-flex;
      flex: 0 0 auto;
      color: currentColor;
      background-color: currentColor;
      -webkit-mask: var(--icon) center / contain no-repeat;
      mask: var(--icon) center / contain no-repeat;
    }

    .icon.home { --icon: url("assets/icons/a-AI__主页.svg"); }
    .icon.doc { --icon: url("assets/icons/b-办公文档__Document.svg"); }
    .icon.kb { --icon: url("assets/icons/a-AI__知识库.svg"); }
    .icon.ai { --icon: url("assets/icons/a-AI__AI对话.svg"); }
    .icon.discover { --icon: url("assets/icons/a-AI__发现.svg"); }
    .icon.drive { --icon: url("assets/icons/y-硬件__云存储.svg"); }
    .icon.tools { --icon: url("assets/icons/a-AI__工具.svg"); }
    .icon.search { --icon: url("assets/icons/j-基础__Search.svg"); }
    .icon.plus { --icon: url("assets/icons/f-符号标识__Plus.svg"); }
    .icon.settings { --icon: url("assets/icons/j-基础__-设置.svg"); }
    .icon.folder { --icon: url("assets/icons/b-办公文档__Folder.svg"); }
    .icon.ppt { --icon: url("assets/icons/b-办公文档__PPT.svg"); }
    .icon.meeting { --icon: url("assets/icons/a-AI__会议纪要.svg"); }
    .icon.summary { --icon: url("assets/icons/a-AI__摘要1.svg"); }
    .icon.word { --icon: url("assets/icons/b-办公文档__Word.svg"); }
    .icon.excel { --icon: url("assets/icons/b-办公文档__Excel.svg"); }
    .icon.upload { --icon: url("assets/icons/j-箭头方向__Upload.svg"); }
    .icon.send { --icon: url("assets/icons/j-箭头方向__Send.svg"); }
    .icon.star { --icon: url("assets/icons/f-符号标识__收藏.svg"); }
    .icon.star-on { --icon: url("assets/icons/f-符号标识__已收藏.svg"); }
    .icon.more { --icon: url("assets/icons/j-基础__更多.svg"); }
    .icon.auth { --icon: url("assets/icons/b-办公文档__权限.svg"); }
    .icon.shield { --icon: url("assets/icons/a-安全防护__Shield.svg"); }
    .icon.share { --icon: url("assets/icons/b-编辑__分享.svg"); }
    .icon.comment { --icon: url("assets/icons/j-交流沟通__评论.svg"); }
    .icon.agent { --icon: url("assets/icons/a-AI__智能体.svg"); }
    .icon.magic { --icon: url("assets/icons/a-AI__魔杖1.svg"); }
    .icon.database { --icon: url("assets/icons/s-数据图表__Database.svg"); }
    .icon.list { --icon: url("assets/icons/b-编辑__列表模式.svg"); }
    .icon.card { --icon: url("assets/icons/b-编辑__卡片查看模式.svg"); }
    .icon.chevron { --icon: url("assets/icons/j-箭头方向__下.svg"); }
    .icon.arrow { --icon: url("assets/icons/j-箭头方向__右.svg"); }

    .card {
      border: 1px solid var(--fs-divider);
      border-radius: var(--fs-radius-lg);
      background: #FFFFFF;
      box-shadow: var(--fs-shadow-sm);
    }

    .tag-row,
    .chip-row,
    .meta-row,
    .action-row {
      display: flex;
      align-items: center;
      gap: var(--fs-space-2);
      flex-wrap: wrap;
    }

    .tag {
      height: 22px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 0 8px;
      border-radius: var(--fs-radius-sm);
      background: var(--fs-bg-hover);
      color: var(--fs-text-secondary);
      font-size: 12px;
      line-height: 20px;
      white-space: nowrap;
    }

    .tag.blue {
      background: var(--fs-primary-light);
      color: var(--fs-primary);
    }

    .tag.green {
      background: rgba(18, 205, 122, 0.12);
      color: #0BAA63;
    }

    .tag.orange {
      background: rgba(255, 171, 46, 0.14);
      color: #B66B00;
    }

    .tag.red {
      background: rgba(255, 77, 72, 0.12);
      color: #CE302B;
    }

    .muted {
      color: var(--fs-text-secondary);
    }

    .faint {
      color: var(--fs-text-tertiary);
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--fs-space-4);
      margin-bottom: 12px;
    }

    .section-title h2 {
      margin: 0;
      color: var(--fs-text-title);
      font-size: 16px;
      line-height: 24px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .section-title p {
      margin: 2px 0 0;
      color: var(--fs-text-secondary);
      font-size: 13px;
      line-height: 20px;
    }

    .home-command {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 286px;
      gap: var(--fs-space-4);
      margin-bottom: 20px;
    }

    .ask-card {
      padding: 18px;
    }

    .ask-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--fs-space-4);
      margin-bottom: 14px;
    }

    .ask-head h2 {
      margin: 0;
      font-size: 20px;
      line-height: 30px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .ask-head p {
      margin: 3px 0 0;
      color: var(--fs-text-secondary);
      font-size: 13px;
      line-height: 20px;
    }

    .scope-pills {
      display: flex;
      align-items: center;
      gap: var(--fs-space-2);
      flex-wrap: wrap;
    }

    .pill {
      height: 28px;
      border: 1px solid var(--fs-divider);
      border-radius: var(--fs-radius-full);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      background: #FFFFFF;
      color: var(--fs-text-secondary);
      font-size: 13px;
      white-space: nowrap;
    }

    .pill.active {
      border-color: rgba(56, 115, 250, 0.22);
      background: var(--fs-primary-light);
      color: var(--fs-primary);
      font-weight: 500;
    }

    .ask-box {
      border: 1px solid #DCE6F5;
      border-radius: var(--fs-radius-lg);
      background: #FFFFFF;
      overflow: hidden;
    }

    .ask-box textarea {
      width: 100%;
      min-height: 84px;
      display: block;
      resize: none;
      border: 0;
      outline: 0;
      padding: 14px 16px;
      color: var(--fs-text-title);
      font-size: 15px;
      line-height: 24px;
    }

    .ask-toolbar {
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--fs-space-3);
      padding: 8px 10px;
      border-top: 1px solid var(--fs-divider);
      background: #FAFCFF;
    }

    .suggestions {
      display: flex;
      gap: var(--fs-space-2);
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .suggestion {
      height: 30px;
      border: 1px solid var(--fs-divider);
      border-radius: var(--fs-radius-md);
      background: #FFFFFF;
      color: var(--fs-text-secondary);
      padding: 0 10px;
      font-size: 13px;
    }

    .suggestion:hover {
      color: var(--fs-primary);
      border-color: rgba(56, 115, 250, 0.26);
      background: #F7FAFF;
    }

    .health-card {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: var(--fs-space-3);
    }

    .health-score {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: var(--fs-space-3);
    }

    .health-score strong {
      font-size: 34px;
      line-height: 38px;
      letter-spacing: 0;
    }

    .progress {
      height: 8px;
      overflow: hidden;
      border-radius: var(--fs-radius-full);
      background: #EEF2F7;
    }

    .progress span {
      height: 100%;
      display: block;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--fs-primary), #12CD7A);
    }

    .workflow {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--fs-space-3);
      margin-bottom: 20px;
    }

    .workflow-step {
      padding: 16px;
      min-height: 126px;
      display: flex;
      flex-direction: column;
      gap: var(--fs-space-3);
    }

    .workflow-step .step-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--fs-space-3);
    }

    .step-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--fs-radius-lg);
      display: grid;
      place-items: center;
      color: var(--fs-primary);
      background: var(--fs-primary-light);
    }

    .workflow-step h3,
    .tool-card h3,
    .space-card h3,
    .kb-card h3,
    .resource-card h3 {
      margin: 0;
      color: var(--fs-text-title);
      font-size: 15px;
      line-height: 22px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .workflow-step p,
    .tool-card p,
    .space-card p,
    .kb-card p,
    .resource-card p {
      margin: 0;
      color: var(--fs-text-secondary);
      font-size: 13px;
      line-height: 20px;
    }

    .two-column {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      gap: var(--fs-space-4);
    }

    .panel {
      padding: 16px;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: var(--fs-space-2);
    }

    .task-item {
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr) auto;
      align-items: center;
      gap: var(--fs-space-3);
      padding: 10px;
      border-radius: var(--fs-radius-lg);
    }

    .task-item:hover {
      background: var(--fs-bg-hover);
    }

    .task-item h4 {
      margin: 0;
      font-size: 14px;
      line-height: 22px;
      font-weight: 600;
      letter-spacing: 0;
    }

    .task-item p {
      margin: 0;
      color: var(--fs-text-secondary);
      font-size: 12px;
      line-height: 20px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .quiet-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--fs-space-3);
    }

    .metric {
      padding: 12px;
      border-radius: var(--fs-radius-lg);
      background: #F8FAFD;
    }

    .metric strong {
      display: block;
      font-size: 18px;
      line-height: 26px;
      letter-spacing: 0;
    }

    .metric span {
      color: var(--fs-text-secondary);
      font-size: 12px;
      line-height: 18px;
    }

    .grid {
      display: grid;
      gap: var(--fs-space-4);
    }

    .grid.cols-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid.cols-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .grid.cols-4 {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .space-card,
    .kb-card,
    .resource-card,
    .tool-card {
      padding: 16px;
      display: flex;

                  <th>名称</th>
                  <th>修改时间（修改人）</th>
                  <th>大小</th>
                  <th style="text-align: right;">推荐动作</th>
                </tr>
              </thead>
              <tbody>
                ${items.length === 0 ? `
                  <tr class="empty-row">
                    <td colspan="4">
                      <div class="empty-state">
                        <span class="step-icon">${icon("search")}</span>
                        <h3>没有找到匹配的文件</h3>
                        <p>清空搜索，或上传文件后让 AI 生成摘要并加入知识库。</p>
                        <button class="btn primary" type="button" data-toast="上传入口已准备">${icon("upload")}上传资料</button>
                      </div>
                    </td>
                  </tr>
                ` : items.map((file) => `
                  <tr>
                    <td><div class="file-name">${icon(file.type)}<strong>${file.name}</strong><span class="tag ${file.action === "已入库" ? "green" : file.action === "待摘要" ? "orange" : "blue"}">${file.action}</span></div></td>
                    <td><span class="muted">${file.updated}（${file.owner}）</span></td>
                    <td><span class="muted">${file.size}</span></td>
                    <td>
                      <div class="file-actions">
                        <button class="btn compact primary" type="button" data-screen="ai">${icon("ai")}问 AI</button>
                        <button class="btn compact" type="button" data-toast="已生成文件摘要">${icon("summary")}摘要</button>
                        <button class="btn compact" type="button" data-toast="已加入知识库候选">${icon("kb")}入库</button>
                      </div>
                    </td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </section>
        </div>
      `;
    }

    function renderTools() {
      return `
        <div class="tabs">
          <button class="tab active" type="button">推荐应用</button>
          <button class="tab" type="button">文件流转</button>
          <button class="tab" type="button">知识治理</button>
          <button class="tab" type="button">我的常用</button>
        </div>
        <section class="card panel" style="margin-bottom: 18px;" data-screen-label="工具-常用工具">
          <div class="section-title">
            <div>
              <h2>常用工具</h2>
              <p>把原工具页的大标题收拢为高频任务入口，优先服务文件处理。</p>
            </div>
          </div>
          <div class="grid cols-4">
            ${tools.slice(0, 4).map((item) => `
              <article class="tool-card card">
                <div class="card-title-block">
                  <span class="card-avatar ${item.tone}">${icon(item.icon)}</span>
                  <div class="card-main">
                    <h3>${item.name}</h3>
                    <p>${item.desc}</p>
                  </div>
                </div>
                <div class="tag-row"><span class="tag blue">${item.tag}</span><span class="tag">可引用知识库</span></div>
                <button class="btn compact primary" type="button" data-toast="${item.name} 已打开">${icon("arrow")}使用</button>
              </article>
            `).join("")}
          </div>
        </section>
        <section>
          <div class="section-title">
            <div>
              <h2>文件流转</h2>
              <p>面向“收集、审阅、分享、审批”的流程型场景。</p>
            </div>
          </div>
          <div class="grid cols-4">
            ${tools.slice(4).map((item) => `
              <article class="tool-card card">
                <div class="card-title-block">
                  <span class="card-avatar ${item.tone}">${icon(item.icon)}</span>
                  <div class="card-main">
                    <h3>${item.name}</h3>
                    <p>${item.desc}</p>
                  </div>
                </div>
                <div class="tag-row"><span class="tag">${item.tag}</span><span class="tag green">可自动归档</span></div>
                <button class="btn compact" type="button" data-toast="${item.name} 流程已创建">${icon("plus")}创建</button>
              </article>
            `).join("")}
          </div>
        </section>
      `;
    }

    function renderDiscover() {
      const isKnowledge = state.discoverMode === "knowledge";
      const items = filterItems(isKnowledge ? resources : agents);
      return `
        <div class="discover-header" data-screen-label="发现-场景化广场">
          <div class="discover-title">
            <h2>${isKnowledge ? "知识资源" : "智能体资源"}，按场景找到可复用能力</h2>
            <p>${isKnowledge ? "每张卡片补足来源、负责人、文档数和可信状态。" : "从使用人数、适用空间和版本判断是否值得复用。"}</p>
          </div>
          <div class="scope-pills">
            <button class="pill ${isKnowledge ? "active" : ""}" type="button" data-discover="knowledge">${icon("kb")}知识资源</button>
            <button class="pill ${!isKnowledge ? "active" : ""}" type="button" data-discover="agent">${icon("agent")}智能体资源</button>
          </div>
        </div>

        <div class="category-row">
          <button class="category active" type="button">全部</button>
          <button class="category" type="button">研发效能</button>
          <button class="category" type="button">办公服务</button>
          <button class="category" type="button">合规与安全</button>
          <button class="category" type="button">产品研发</button>
          <button class="category" type="button">项目管理</button>
          <button class="category" type="button">更多</button>
        </div>

        ${!isKnowledge ? `
          <section class="card panel" style="margin-bottom: 18px;">
            <div class="section-title">
              <div>
                <h2>智能体数据统计</h2>
                <p>空状态给出行动入口，而不是只显示暂无内容。</p>
              </div>
              <button class="btn primary" type="button">${icon("plus")}创建智能体</button>
            </div>
            <div class="quiet-grid">
              <div class="metric"><strong>0</strong><span>使用数量 · 较上周 --</span></div>
              <div class="metric"><strong>0</strong><span>使用次数 · 较上周 --</span></div>
              <div class="metric"><strong>0</strong><span>回答采纳数 · 较上周 --</span></div>
            </div>
          </section>
        ` : ""}

        ${items.length === 0 ? emptyState("没有找到匹配的资源", "换个关键词，或发布团队内部常用资源。", "发布资源") : `
        <div class="grid cols-3">
          ${items.map((item) => isKnowledge ? `
            <article class="card resource-card">
              <div class="card-head">
                <div class="card-title-block">
                  <span class="card-avatar">${icon(item.icon)}</span>
                  <div class="card-main">
                    <h3>${item.name}</h3>
                    <p>${item.type} · ${item.owner}</p>
                  </div>
                </div>
                <span class="tag ${item.usage === "已加入" ? "green" : item.usage === "官方" ? "blue" : ""}">${item.usage}</span>
              </div>
              <p>${item.desc}</p>
              <div class="tag-row">
                <span class="tag">${item.scope}</span>
                <span class="tag">${item.docs} 个文档</span>
                <span class="tag green">${icon("shield")}可信来源</span>
              </div>
              ${cardActions("问此资源", item.usage === "已加入" ? "打开" : "加入")}
            </article>
          ` : `
            <article class="card resource-card">
              <div class="card-head">
                <div class="card-title-block">
                  <span class="card-avatar">${icon(item.icon)}</span>
                  <div class="card-main">
                    <h3>${item.name}</h3>
                    <p>${item.desc}</p>
                  </div>
                </div>
                <button class="icon-button" type="button" aria-label="收藏">${icon("star")}</button>
              </div>
              <div class="tag-row">
                <span class="tag blue">${item.usage}</span>
                <span class="tag">${item.scope}</span>
                <span class="tag">${item.version}</span>
              </div>
              ${cardActions("试用智能体", "加入")}
            </article>
          `).join("")}
        </div>
        `}
      `;
    }

    function renderContent() {
      const content = document.getElementById("content");
      content.className = state.screen === "ai" || state.screen === "drive" ? "content narrow" : "content";
      const map = {
        home: renderHome,
        spaces: renderSpaces,
        knowledge: renderKnowledge,
        ai: renderAi,
        drive: renderDrive,
        tools: renderTools,
        discover: renderDiscover
      };
      content.innerHTML = map[state.screen]();
      renderTopbar();
      renderSideNav();
    }

    function showToast(text) {
      const toast = document.getElementById("toast");
      toast.textContent = text;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1800);
    }

    document.addEventListener("click", (event) => {
      const screenTarget = event.target.closest("[data-screen]");
      if (screenTarget) {
        state.screen = screenTarget.dataset.screen;
        renderContent();
        return;
      }

      const discoverTarget = event.target.closest("[data-discover]");
      if (discoverTarget) {
        state.discoverMode = discoverTarget.dataset.discover;
        renderContent();
        return;
      }

      const toastTarget = event.target.closest("[data-toast]");
      if (toastTarget) {
        showToast(toastTarget.dataset.toast);
      }
    });

    document.getElementById("globalSearch").addEventListener("input", (event) => {
      state.query = event.target.value;
      renderContent();
    });

    renderRail();
    renderContent();
  </script>
</body>
</html>
